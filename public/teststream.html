<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix Player - Direct Stream Test</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #020617; /* Deep cinema black-blue */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Seamless Edge-to-Edge Player */
        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Preserves original movie aspect ratios perfectly */
            outline: none;
        }

        /* Premium Floating Overlay Back Button */
        .back-overlay-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            opacity: 0.3; /* Subtle presence until hovered */
        }

        .back-overlay-btn:hover {
            opacity: 1;
            background: rgba(15, 23, 42, 0.9);
            transform: translateX(-2px);
        }

        /* Quality Indicator Tag */
        .quality-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            background: #0284c7; /* Testing Blue */
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Fade utilities for overlay elements when mouse is still */
        .hide-controls {
            opacity: 0 !important;
            cursor: none;
        }
    </style>
</head>
<body>

    <div class="player-container" id="stage">
        <a href="/" class="back-overlay-btn" id="backBtn">⏮ Exit Test Mode</a>
        <div class="quality-badge" id="qualityTag">CONNECTING TO NEXTCLOUD STAGE...</div>
        <video id="cinemaVideo" controls autoplay playsinline></video>
    </div>

    <script>
        const videoEl = document.getElementById('cinemaVideo');
        const qualityTag = document.getElementById('qualityTag');
        const backBtn = document.getElementById('backBtn');
        const stage = document.getElementById('stage');

        function runDirectStreamTest() {
            // Using your confirmed working public folder share token
            const folderShareToken = "fSEHqLFCmfoorRT";
            
            // Once rclone finishes the upload over Cloudflare, this path construction will resolve the media bytes
            const targetFileName = "The.Avengers.2012.1080p.BluRay.x264.YIFY.web.mp4";
            
            const targetStreamUrl = `https://cloud.joshjames.site/s/${folderShareToken}/download?path=%2F&files=${encodeURIComponent(targetFileName)}`;
            
            qualityTag.innerText = "FHD 1080P (NEXTCLOUD DIRECT STREAM)";
            videoEl.src = targetStreamUrl;

            videoEl.play().catch((err) => {
                console.log("Autoplay context initialization paused for manual user interaction click event.", err);
                qualityTag.innerText = "AWAITING USER INTERACTION (CLICK PLAY)";
            });
        }

        // Custom UI Polish: Visibility fade controls
        let mouseMoveTimeout;
        function resetControlVisibility() {
            backBtn.classList.remove('hide-controls');
            qualityTag.classList.remove('hide-controls');
            stage.style.cursor = 'default';
            
            clearTimeout(mouseMoveTimeout);
            if (!videoEl.paused) {
                mouseMoveTimeout = setTimeout(() => {
                    backBtn.classList.add('hide-controls');
                    qualityTag.classList.add('hide-controls');
                    stage.style.cursor = 'none';
                }, 3000); 
            }
        }

        document.addEventListener('mousemove', resetControlVisibility);
        videoEl.addEventListener('play', resetControlVisibility);
        videoEl.addEventListener('pause', resetControlVisibility);

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                if (videoEl.paused) videoEl.play(); else videoEl.pause();
            }
        });

        // Initialize immediately without param dependency checks
        runDirectStreamTest();
    </script>
</body>
</html>
