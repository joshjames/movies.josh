<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server</title>
    <style>
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }
        h1 { 
            text-align: center; 
            color: #f1f5f9; 
            font-size: 1.8rem;
            margin: 20px 0;
        }
        .grid { 
            display: grid; 
            /* Responsive layout: fluid scaling columns based on device boundaries */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 16px; 
            padding: 10px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .card { 
            background: #1e293b; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: transform 0.2s, box-shadow 0.2s; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .cover-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #020617;
        }
        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        .card-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card .title { 
            font-size: 0.95rem;
            font-weight: bold; 
            line-height: 1.3;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .card .meta-line {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Tablet/Desktop expansion sizing overrides */
        @media(min-width: 640px) {
            body { padding: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <h1>Library Movies</h1>
    <div class="grid" id="movie-grid"></div>

    <div style="text-align: center; margin-bottom: 20px;">
    <a href="/browse.html" style="background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
        🔍 Browse & Add New Movies
    </a>
</div>

    <script>
        async function loadMovies() {
            const res = await fetch('/api/movies');
            const movies = await res.json();
            const grid = document.getElementById('movie-grid');
            
            grid.innerHTML = movies.map(movie => `
                <a class="card" href="player.html?id=${movie.id}">
                    <div class="cover-wrapper">
                        <img src="${movie.cover}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'" alt="${movie.title}">
                    </div>
                    <div class="card-content">
                        <div class="title">${movie.title}</div>
                        <div class="meta-line">${movie.year ? movie.year : ''}</div>
                    </div>
                </a>
            `).join('');
        }
        loadMovies();
    </script>
</body>
</html>
