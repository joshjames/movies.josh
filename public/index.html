<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server</title>
    <style>
        body { 
            background: #0f172a; 
            display: flex;
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }
        h1 { 
            text-align: center; 
            color: #f1f5f9; 
            font-size: 1.8rem;
            margin: 20px 0;
        }
        .grid { 
            display: grid; 
            /* Responsive layout: fluid scaling columns based on device boundaries */
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 16px; 
            padding: 10px; 
            max-width: 1200px;
            margin: 0 auto;
        }
        .card { 
            background: #1e293b; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: transform 0.2s, box-shadow 0.2s; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }
        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .cover-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #020617;
        }
        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        .card-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }
        .card .title { 
            font-size: 0.95rem;
            font-weight: bold; 
            line-height: 1.3;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .card .meta-line {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        /* Tablet/Desktop expansion sizing overrides */
        @media(min-width: 640px) {
            body { padding: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
            h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
<div class="logo-wrapper">
    <svg viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <path id="textArchPath" d="M 50,95 Q 250,45 450,95" fill="none" />
            
            <filter id="cinematicGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.9" />
                <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#b91c1c" flood-opacity="0.4" />
            </filter>
        </defs>
        
        <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
              font-size="52" 
              font-weight="900" 
              letter-spacing="4" 
              fill="#e50914" 
              filter="url(#cinematicGlow)">
            <textPath href="#textArchPath" startOffset="50%" text-anchor="middle">
                JOSHFLIX
            </textPath>
        </text>
    </svg>
</div>

<style>
    /* Responsive sizing envelope wrapper for your navbar integration */
    .logo-wrapper {
        width: 100%;
        max-width: 240px; /* Limits scale to fit cleanly inside your existing flex navigation row */
        display: inline-block;
        vertical-align: center;
        align-items: center;

    }
    
    /* Optional hovering animation effect to make the UI feel premium */
    .logo-wrapper svg {
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
    }
    .logo-wrapper svg:hover {
        transform: scale(1.04);
    }
</style>


    <!-- <h1>Library Movies</h1> -->
    <div class="grid" id="movie-grid"></div>

    <div style="text-align: center; margin-bottom: 20px;">
    <a href="/browse.html" style="background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
        🔍 Browse & Add New Movies
    </a>
</div>
<div id="pipeline-monitor" style="max-width: 1200px; margin: 40px auto 20px auto; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; display: none;">
    <h3 style="margin-top: 0; color: #3b82f6; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
        ⚙️ System Ingestion & Processing Pipeline
    </h3>
    <div id="pipeline-rows" style="display: flex; flex-direction: column; gap: 12px;">
        </div>
</div>

    <script>
        async function loadMovies() {
    try {
        const res = await fetch('/api/movies');
        const data = await res.json(); // Rename this from 'movies' to 'data'
        
        const grid = document.getElementById('movie-grid');
        
        // Safety check: Make sure we have our internal movies array
        if (data && data.movies && data.movies.length > 0) {
            grid.innerHTML = data.movies.map(movie => `
                <a class="card" href="player.html?id=${movie.id}">
                    <div class="cover-wrapper">
                        <img src="${movie.cover}" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'" alt="${movie.title}">
                    </div>
                    <div class="card-content">
                        <div class="title">${movie.title}</div>
                        <div class="meta-line">${movie.year ? movie.year : ''}</div>
                    </div>
                </a>
            `).join('');
        } else {
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 40px;">Your media library is currently empty. Click above to add movies!</div>`;
        }
    } catch (err) {
        console.error("❌ Frontend failed to unpack cached pagination layer payloads:", err);
    }
}
loadMovies();
    </script>



<script>
    async function updatePipelineStatus() {
        const monitorBox = document.getElementById('pipeline-monitor');
        const rowsContainer = document.getElementById('pipeline-rows');

        try {
            const res = await fetch('/api/pipeline/status');
            const data = await res.json();

            if (data.success && data.pipeline.length > 0) {
                monitorBox.style.display = 'block'; // Make widget visible if tasks exist
                
                rowsContainer.innerHTML = data.pipeline.map(item => {
                    let statusColor = '#f59e0b'; // Default downloading yellow
                    if (item.status.includes('Transcoding')) statusColor = '#a855f7'; // Processing Purple
                    if (item.status.includes('Queued')) statusColor = '#64748b'; // Idle Gray

                    return `
                        <div style="background: #0f172a; padding: 12px 16px; border-radius: 8px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; border-left: 4px solid ${statusColor};">
                            <div style="flex-grow: 1; min-width: 250px;">
                                <strong style="font-size: 0.95rem; color: #f8fafc;">${item.title}</strong>
                                <div style="font-size: 0.75rem; color: #94a3b8; margin-top: 4px;">Size: ${item.size}</div>
                            </div>
                            <div style="display: flex; align-items: center; gap: 20px;">
                                <span style="background: ${statusColor}20; color: ${statusColor}; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;">
                                    ${item.status}
                                </span>
                                <div style="text-align: right; min-width: 80px;">
                                    <strong style="color: #38bdf8; font-size: 1rem;">${item.progress}%</strong>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } else {
                monitorBox.style.display = 'none'; // Keep hidden if pipeline is completely idle
            }
        } catch (err) {
            console.error("Failed querying system sync states.");
        }
    }

    // Run poll query loop every 5 seconds to manage live screen states
    setInterval(updatePipelineStatus, 5000);
    updatePipelineStatus();
</script>



</body>
</html>
