<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }

        /* Layout Alignment Wrapper Engine */
        .main-header {
            width: 100%;
            background: #0f172a;
            padding: 12px 10px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 16px;
        }

        /* Precise Sizing Control for the Arched Vector SVG Asset */
        .logo-wrapper {
            width: 160px; 
            display: flex;
            align-items: center;
        }

        .logo-wrapper svg {
            width: 100%;
            height: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .logo-wrapper svg:hover {
            transform: scale(1.05);
        }

        /* Center Section: Session Meta Information Module */
        .profile-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .welcome-msg {
            color: #94a3b8; 
            font-size: 0.85rem; 
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(229, 9, 20, 0.1); 
            border: 1px solid rgba(229, 9, 20, 0.3); 
            color: #f87171; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            transition: all 0.2s;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: rgba(229, 9, 20, 0.2);
            border-color: rgba(229, 9, 20, 0.5);
        }

        /* Right Section: Navigation Controls */
        .browse-nav-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .browse-nav-btn:hover {
            background: #1d4ed8;
        }

        /* Main Content Media Grid Layout */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 16px; 
            padding: 10px; 
            max-width: 1200px;
            margin: 20px auto;
        }

        .card { 
            background: #1e293b; 
            border-radius: 12px; 
            overflow: hidden; 
            transition: transform 0.2s, box-shadow 0.2s; 
            cursor: pointer; 
            text-decoration: none; 
            color: white; 
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .cover-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 2 / 3;
            background: #020617;
        }

        .card img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .card-content {
            padding: 12px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .card .title { 
            font-size: 0.95rem;
            font-weight: bold; 
            line-height: 1.3;
            color: #f1f5f9;
            margin-bottom: 4px;
        }

        .card .meta-line {
            font-size: 0.8rem;
            color: #94a3b8;
        }

                /* Container for alignment */
        .brand-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: 'Helvetica Neue', Arial, sans-serif; /* Adjust to match your current font choice */
        }

        /* The upper arced text string */
        .logo-main-arc {
            color: #E50914; /* Netflix/Joshflix core structural red */
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            
            /* 3D Transform to simulate a cinematic lens arc distortion */
            transform: perspective(100px) rotateX(15deg) scaleY(1.1);
            display: inline-block;
            
            /* Subtle text shadow to give it depth on a dark UI background */
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.7);
        }

        /* The lower aligned element text string */
        .logo-sub-text {
            color: #FFFFFF; /* High contrast white text */
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 6px; /* High tracking spacing to make it fit evenly under the main text frame */
            text-transform: uppercase;
            margin-top: -2px; /* Pulls it up slightly so it nests nicely right inside the curve line */
            opacity: 0.9;
        }

        /* Tablet/Desktop expansion sizing overrides */
        @media(min-width: 640px) {
            body { padding: 20px; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 24px; }
            .main-header { padding: 20px 0; }
            .logo-wrapper { width: 220px; } 
            .welcome-msg { font-size: 0.9rem; }
            .browse-nav-btn { padding: 12px 24px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
           

            <div class="profile-controls">
    <a href="/admin.html" id="admin-action-btn" style="display: none; background: #9333ea; color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; white-space: nowrap;">🛠️ Admin Desk</a>
    
    <span id="welcome-user" class="welcome-msg">Cinema Active</span>
    <a href="/api/auth/logout" class="logout-btn">Switch Profile ⎋</a>
</div><div class="logo-wrapper" onclick="window.location.href='/';">
    <svg viewBox="0 0 500 135" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <path id="textArchPath" d="M 50,85 Q 250,35 450,85" fill="none" />
            
            <filter id="cinematicGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.9" />
                <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#b91c1c" flood-opacity="0.4" />
            </filter>
        </defs>

        <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
              font-size="52" 
              font-weight="900" 
              letter-spacing="5" 
              fill="#e50914" 
              filter="url(#cinematicGlow)">
            <textPath href="#textArchPath" startOffset="50%" text-anchor="middle">
                ANYMOVIE
            </textPath>
        </text>

        <text x="50%" 
              y="118" 
              font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
              font-size="16" 
              font-weight="700" 
              letter-spacing="14" 
              fill="#ffffff" 
              text-anchor="middle"
              opacity="0.9">
            ONLINE
        </text>
    </svg>
</div>

            <div class="nav-actions">
                <a href="/browse.html" class="browse-nav-btn">🔍 Browse Catalog</a>
            </div>
        </div>
    </header>

    <div class="grid" id="movie-grid"></div>

    <div id="pagination-container" style="display: flex; justify-content: center; align-items: center; gap: 12px; margin: 30px auto; max-width: 600px;"></div>

    <div style="text-align: center; margin-bottom: 20px;">
        <a href="/browse.html" style="background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            🔍 Browse & Add New Movies
        </a>
    </div>

    <div id="pipeline-monitor" style="max-width: 1200px; margin: 40px auto 20px auto; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; display: none;">
        <h3 style="margin-top: 0; color: #3b82f6; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
            ⚙️ System Ingestion & Processing Pipeline
        </h3>
        <div id="pipeline-rows" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>

    <script>
        let currentCatalogPage = 1;

        async function hydrateUserProfileHeader() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                if (data.loggedIn) {
                    const cleanUsername = data.username.toLowerCase().trim();
                    const formattedName = data.username.charAt(0).toUpperCase() + data.username.slice(1);
                    document.getElementById('welcome-user').innerText = `🍿 Operator: ${formattedName}`;
                    
                    // 🛡️ IDENTITY GATING: Expose admin configurations explicitly for 'josh'
                    if (cleanUsername === 'josh') {
                        const adminBtn = document.getElementById('admin-action-btn');
                        if (adminBtn) {
                            adminBtn.style.display = 'inline-block';
                        }
                    }
                }
            } catch (e) {
                console.error("Profile name tracking sync lost.");
            }
        }

        async function loadMovies(page = 1) {
            currentCatalogPage = page;
            try {
                const res = await fetch(`/api/movies?page=${page}`);
                const data = await res.json(); 
                const grid = document.getElementById('movie-grid');
                
                if (data && data.movies && data.movies.length > 0) {
                    grid.innerHTML = data.movies.map(media => {
                        const targetEndpoint = (media.contentType === 'series') ? 'series.html' : 'player.html';
                        const badgeHtml = (media.contentType === 'series') 
                            ? `<span style="position: absolute; bottom: 8px; right: 8px; background: #6366f1; color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase;">TV Show</span>`
                            : '';

                        return `
                            <a class="card" href="${targetEndpoint}?id=${media.id}">
                                <div class="cover-wrapper">
                                    <img src="${media.cover}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'300\' viewBox=\'0 0 200 300\'><rect width=\'100%\' height=\'100%\' fill=\'%23020617\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23475569\' font-family=\'sans-serif\' font-size=\'14\'>No Cover</text></svg>';" alt="${media.title}">
                                    ${badgeHtml}
                                </div>
                                <div class="card-content">
                                    <div class="title">${media.title}</div>
                                    <div class="meta-line">${media.year ? media.year : ''}</div>
                                </div>
                            </a>
                        `;
                    }).join('');

                    renderPaginationControls(data.totalPages, data.currentPage);
                } else {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #64748b; padding: 40px;">Your media library is currently empty. Click above to add content!</div>`;
                    document.getElementById('pagination-container').innerHTML = '';
                }
            } catch (err) {
                console.error("❌ Frontend failed to unpack cached dashboard assets:", err);
            }
        }

        function renderPaginationControls(totalPages, currentPage) {
            const container = document.getElementById('pagination-container');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = '';
            html += `
                <button ${currentPage === 1 ? 'disabled' : ''} 
                        onclick="loadMovies(${currentPage - 1})" 
                        style="background: #1e293b; color: #f8fafc; border: 1px solid #334155; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: ${currentPage === 1 ? 'not-allowed' : 'pointer'}; opacity: ${currentPage === 1 ? '0.4' : '1'}; transition: background 0.2s;">
                    &larr; Prev
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                const isActive = (i === currentPage);
                html += `
                    <button onclick="loadMovies(${i})" 
                            style="background: ${isActive ? '#2563eb' : '#1e293b'}; color: white; border: 1px solid ${isActive ? '#2563eb' : '#334155'}; padding: 8px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                        ${i}
                    </button>
                `;
            }

            html += `
                <button ${currentPage === totalPages ? 'disabled' : ''} 
                        onclick="loadMovies(${currentPage + 1})" 
                        style="background: #1e293b; color: #f8fafc; border: 1px solid #334155; padding: 8px 16px; border-radius: 6px; font-weight: 600; cursor: ${currentPage === totalPages ? 'not-allowed' : 'pointer'}; opacity: ${currentPage === totalPages ? '0.4' : '1'}; transition: background 0.2s;">
                    Next &rarr;
                </button>
            `;
            container.innerHTML = html;
        }

        async function updatePipelineStatus() {
            const monitorBox = document.getElementById('pipeline-monitor');
            const rowsContainer = document.getElementById('pipeline-rows');

            try {
                const res = await fetch('/api/pipeline/status');
                const data = await res.json();

                if (data.success && data.pipeline.length > 0) {
                    monitorBox.style.display = 'block';
                    rowsContainer.innerHTML = data.pipeline.map(item => {
                        let statusColor = '#f59e0b';
                        if (item.status.includes('Transcoding')) statusColor = '#a855f7';
                        if (item.status.includes('Queued')) statusColor = '#64748b';

                        return `
                            <div style="background: #0f172a; padding: 12px 16px; border-radius: 8px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; border-left: 4px solid ${statusColor};">
                                <div style="flex-grow: 1; min-width: 250px;">
                                    <strong style="font-size: 0.95rem; color: #f8fafc;">${item.title}</strong>
                                    <div style="font-size: 0.75rem; color: #94a3b8; margin-top: 4px;">Size: ${item.size}</div>
                                </div>
                                <div style="display: flex; align-items: center; gap: 20px;">
                                    <span style="background: ${statusColor}20; color: ${statusColor}; padding: 4px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold;">
                                        ${item.status}
                                    </span>
                                    <div style="text-align: right; min-width: 80px;">
                                        <strong style="color: #38bdf8; font-size: 1rem;">${item.progress}%</strong>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    monitorBox.style.display = 'none';
                }
            } catch (err) {
                console.error("Failed querying system sync states.");
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            hydrateUserProfileHeader();
            loadMovies(1);
            setInterval(updatePipelineStatus, 5000);
            updatePipelineStatus();
        });
    </script>
</body>
</html>
