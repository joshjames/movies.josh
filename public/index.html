<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Server</title>
    <style>
        * { box-sizing: border-box; }
        
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            margin: 0; 
            padding: 10px; 
        }

        /* Layout Alignment Wrapper Engine */
        .main-header {
            width: 100%;
            background: #0f172a;
            padding: 12px 10px;
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between; 
            align-items: center;
            gap: 16px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 16px;
        }

        /* Precise Sizing Control for the Arched Vector SVG Asset */
        .logo-wrapper {
            width: 160px; 
            display: flex;
            align-items: center;
        }

        .logo-wrapper svg {
            width: 100%;
            height: auto;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .logo-wrapper svg:hover {
            transform: scale(1.05);
        }

        /* Center Section: Session Meta Information Module */
        .profile-controls {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .welcome-msg {
            color: #94a3b8; 
            font-size: 0.85rem; 
            font-weight: 500;
        }

        .logout-btn {
            background: rgba(229, 9, 20, 0.1); 
            border: 1px solid rgba(229, 9, 20, 0.3); 
            color: #f87171; 
            text-decoration: none; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            font-weight: 600; 
            transition: all 0.2s;
            white-space: nowrap;
        }

        .logout-btn:hover {
            background: rgba(229, 9, 20, 0.2);
            border-color: rgba(229, 9, 20, 0.5);
        }

        /* Right Section: Navigation Controls */
        .browse-nav-btn {
            background: #2563eb;
            color: white;
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.85rem;
            display: inline-block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: background 0.2s ease;
            white-space: nowrap;
        }

        .browse-nav-btn:hover {
            background: #1d4ed8;
        }

        /* Horizontal Home Collections */
        .collections {
            max-width: 1400px;
            margin: 10px auto 0 auto;
            padding: 0 10px 30px 10px;
        }

        .collection-row {
            margin: 0 0 30px 0;
        }

        .scroller-title {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin: 0 0 10px 0;
            padding: 0 4px;
        }

        .scroller-title h2 {
            margin: 0;
            font-size: 1.1rem;
            color: #f1f5f9;
        }

        .scroller-title span {
            color: #94a3b8;
            font-size: 0.8rem;
        }

        .slider-wrapper {
            position: relative;
        }

        .movie-slider {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 10px 46px 18px 46px;
            scrollbar-width: none;
            scroll-snap-type: x mandatory;
        }

        .movie-slider::-webkit-scrollbar { display: none; }

        .slider-card {
            flex: 0 0 150px;
            position: relative;
            aspect-ratio: 2 / 3;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
            text-decoration: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4);
            transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.25s;
            transform-origin: center center;
            scroll-snap-align: start;
        }

        .slider-card:hover {
            transform: scale(1.06);
            z-index: 10;
            box-shadow: 0 18px 24px -8px rgba(0, 0, 0, 0.65);
        }

        .slider-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 20%;
            display: block;
        }

        .slider-card-overlay {
            position: absolute;
            left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(15,23,42,0) 0%, rgba(15,23,42,0.96) 88%);
            padding: 24px 10px 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .slider-card-overlay .title {
            font-size: 0.92rem;
            font-weight: 700;
            color: #f1f5f9;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .slider-card-overlay .meta-line {
            font-size: 0.72rem;
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .slider-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 2;
            background: #6366f1;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        .arrow__btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 34px;
            height: 64px;
            border: none;
            background: rgba(15, 23, 42, 0.78);
            color: #fff;
            font-size: 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, opacity 0.2s;
            user-select: none;
            border-radius: 8px;
            opacity: 0.95;
        }

        .arrow__btn:hover { background: rgba(15, 23, 42, 0.98); color: #e50914; }
        .left-arrow { left: 8px; }
        .right-arrow { right: 8px; }

        .collection-empty {
            color: #64748b;
            padding: 18px 8px 6px 8px;
            font-size: 0.9rem;
        }

                /* Container for alignment */
        .brand-logo-container {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
            font-family: 'Helvetica Neue', Arial, sans-serif; /* Adjust to match your current font choice */
        }

        /* The upper arced text string */
        .logo-main-arc {
            color: #E50914; /* Netflix/Joshflix core structural red */
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            
            /* 3D Transform to simulate a cinematic lens arc distortion */
            transform: perspective(100px) rotateX(15deg) scaleY(1.1);
            display: inline-block;
            
            /* Subtle text shadow to give it depth on a dark UI background */
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.7);
        }

        /* The lower aligned element text string */
        .logo-sub-text {
            color: #FFFFFF; /* High contrast white text */
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 6px; /* High tracking spacing to make it fit evenly under the main text frame */
            text-transform: uppercase;
            margin-top: -2px; /* Pulls it up slightly so it nests nicely right inside the curve line */
            opacity: 0.9;
        }

        /* Tablet/Desktop expansion sizing overrides */
        @media(min-width: 640px) {
            body { padding: 20px; }
            .main-header { padding: 20px 0; }
            .logo-wrapper { width: 220px; } 
            .welcome-msg { font-size: 0.9rem; }
            .browse-nav-btn { padding: 12px 24px; font-size: 0.95rem; }
            .movie-slider { padding-left: 56px; padding-right: 56px; }
            .slider-card { flex-basis: 180px; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <div class="header-content">
           

            <div class="profile-controls">
    <a href="/admin.html" id="admin-action-btn" style="display: none; background: #9333ea; color: white; text-decoration: none; padding: 6px 12px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; transition: all 0.2s; white-space: nowrap;">🛠️ Admin Desk</a>
    
    <span id="welcome-user" class="welcome-msg">Cinema Active</span>
    <a href="/api/auth/logout" class="logout-btn">Switch Profile ⎋</a>
</div><div class="logo-wrapper" onclick="window.location.href='/';">
    <svg viewBox="0 0 500 135" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <path id="textArchPath" d="M 50,85 Q 250,35 450,85" fill="none" />
            
            <filter id="cinematicGlow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.9" />
                <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#b91c1c" flood-opacity="0.4" />
            </filter>
        </defs>

        <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
              font-size="52" 
              font-weight="900" 
              letter-spacing="5" 
              fill="#e50914" 
              filter="url(#cinematicGlow)">
            <textPath href="#textArchPath" startOffset="50%" text-anchor="middle">
                ANYMOVIE
            </textPath>
        </text>

        <text x="50%" 
              y="118" 
              font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
              font-size="16" 
              font-weight="700" 
              letter-spacing="14" 
              fill="#ffffff" 
              text-anchor="middle"
              opacity="0.9">
            ONLINE
        </text>
    </svg>
</div>

            <div class="nav-actions">
                <a href="/browse.html" class="browse-nav-btn">🔍 Browse Catalog</a>
            </div>
        </div>
    </header>

    <div class="collections" id="movie-grid"></div>

    <div id="pagination-container" style="display: none;"></div>

    <div style="text-align: center; margin-bottom: 20px;">
        <a href="/browse.html" style="background: #2563eb; color: white; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.2);">
            🔍 Browse & Add New Movies
        </a>
    </div>

    <div id="pipeline-monitor" style="max-width: 1200px; margin: 40px auto 20px auto; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; display: none;">
        <h3 style="margin-top: 0; color: #3b82f6; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;">
            ⚙️ System Ingestion & Processing Pipeline
        </h3>
        <div id="pipeline-rows" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>

    <script>
        let currentCatalogPage = 1;

        function safeNumber(value) {
            const parsed = parseFloat(value);
            return Number.isFinite(parsed) ? parsed : null;
        }

        function normalizeGenres(media) {
            const raw = media.genre || media.enrichment?.genre || '';
            return String(raw)
                .split(',')
                .map(item => item.trim())
                .filter(Boolean);
        }

        function getScore(media) {
            return safeNumber(media.imdbScore || media.rating || media.enrichment?.imdbScore);
        }

        async function fetchAllMovies() {
            const pageSize = 100;
            let page = 1;
            let totalPages = 1;
            const all = [];

            while (page <= totalPages) {
                const res = await fetch(`/api/movies?page=${page}&limit=${pageSize}`);
                const data = await res.json();
                if (!data || !Array.isArray(data.movies)) break;

                all.push(...data.movies);
                totalPages = data.totalPages || 1;
                page += 1;
            }

            return all;
        }

        function buildSliderCard(media) {
            const targetEndpoint = (media.contentType === 'series') ? 'series.html' : 'player.html';
            const badgeHtml = (media.contentType === 'series')
                ? '<span class="slider-badge">TV Show</span>'
                : '';
            const genreText = media.genre || media.enrichment?.genre || '';
            const scoreText = media.imdbScore || media.rating || media.enrichment?.imdbScore || '';
            const metaBits = [media.year || '', genreText, scoreText ? `IMDb ${scoreText}` : ''].filter(Boolean).join(' · ');

            return `
                <a class="slider-card" href="${targetEndpoint}?id=${media.id}">
                    ${badgeHtml}
                    <img src="${media.cover}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'300\' viewBox=\'0 0 200 300\'><rect width=\'100%\' height=\'100%\' fill=\'%23020617\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23475569\' font-family=\'sans-serif\' font-size=\'14\'>No Cover</text></svg>';" alt="${media.title}">
                    <div class="slider-card-overlay">
                        <div class="title">${media.title}</div>
                        <div class="meta-line">${metaBits}</div>
                    </div>
                </a>
            `;
        }

        function renderSliderRow(title, subtitle, items, rowId) {
            const cards = items.length > 0
                ? items.map(buildSliderCard).join('')
                : '<div class="collection-empty">No titles found for this collection.</div>';

            return `
                <section class="collection-row">
                    <div class="scroller-title">
                        <h2>${title}</h2>
                        ${subtitle ? `<span>${subtitle}</span>` : ''}
                    </div>
                    <div class="slider-wrapper">
                        <button class="arrow__btn left-arrow" type="button" onclick="scrollSlider('${rowId}', -1)">‹</button>
                        <div class="movie-slider" id="${rowId}">${cards}</div>
                        <button class="arrow__btn right-arrow" type="button" onclick="scrollSlider('${rowId}', 1)">›</button>
                    </div>
                </section>
            `;
        }

        function renderFeedRow(collection) {
            const cards = Array.isArray(collection.cards) && collection.cards.length > 0
                ? collection.cards.map(card => {
                    const badgeHtml = card.badge ? '<span class="slider-badge">TV Show</span>' : '';
                    const metaBits = [card.year || '', card.genre || '', card.imdbScore ? `IMDb ${card.imdbScore}` : ''].filter(Boolean).join(' · ');

                    return `
                        <a class="slider-card" href="${card.href}">
                            ${badgeHtml}
                            <img src="${card.cover}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'300\' viewBox=\'0 0 200 300\'><rect width=\'100%\' height=\'100%\' fill=\'%23020617\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23475569\' font-family=\'sans-serif\' font-size=\'14\'>No Cover</text></svg>';" alt="${card.title}">
                            <div class="slider-card-overlay">
                                <div class="title">${card.title}</div>
                                <div class="meta-line">${metaBits}</div>
                            </div>
                        </a>
                    `;
                }).join('')
                : '<div class="collection-empty">No titles found for this collection.</div>';

            return `
                <section class="collection-row">
                    <div class="scroller-title">
                        <h2>${collection.title || 'Collection'}</h2>
                        ${collection.subtitle ? `<span>${collection.subtitle}</span>` : ''}
                    </div>
                    <div class="slider-wrapper">
                        <button class="arrow__btn left-arrow" type="button" onclick="scrollSlider('${collection.id}', -1)">‹</button>
                        <div class="movie-slider" id="${collection.id}">${cards}</div>
                        <button class="arrow__btn right-arrow" type="button" onclick="scrollSlider('${collection.id}', 1)">›</button>
                    </div>
                </section>
            `;
        }

        function buildCollectionRows(mediaList) {
            const rows = [];

            const recent = [...mediaList].sort((a, b) => {
                const aTime = new Date(a.updatedAt || 0).getTime();
                const bTime = new Date(b.updatedAt || 0).getTime();
                return bTime - aTime;
            });
            rows.push(renderSliderRow('Recently Added', 'newest items first', recent.slice(0, 18), 'recently-added-row'));

            const topRated = [...mediaList]
                .filter(media => getScore(media) !== null && getScore(media) >= 8)
                .sort((a, b) => (getScore(b) || 0) - (getScore(a) || 0));
            rows.push(renderSliderRow('Top Rated', 'IMDb score 8.0 and up', topRated.slice(0, 18), 'top-rated-row'));

            const shows = mediaList.filter(media => media.contentType === 'series');
            if (shows.length > 0) {
                rows.push(renderSliderRow('TV Shows', 'series collection', shows.slice(0, 18), 'series-row'));
            }

            const genreMap = new Map();
            mediaList.forEach(media => {
                normalizeGenres(media).slice(0, 2).forEach(genre => {
                    if (!genreMap.has(genre)) genreMap.set(genre, []);
                    genreMap.get(genre).push(media);
                });
            });

            [...genreMap.entries()]
                .sort((a, b) => b[1].length - a[1].length)
                .slice(0, 3)
                .forEach(([genre, items]) => {
                    rows.push(renderSliderRow(genre, 'genre collection', items.slice(0, 18), `genre-${genre.toLowerCase().replace(/[^a-z0-9]+/g, '-')}`));
                });

            return rows.join('');
        }

        function scrollSlider(rowId, direction) {
            const slider = document.getElementById(rowId);
            if (!slider) return;

            const scrollAmount = slider.clientWidth * 0.75;
            slider.scrollBy({
                left: direction * scrollAmount,
                behavior: 'smooth'
            });
        }

        async function hydrateUserProfileHeader() {
            try {
                const res = await fetch('/api/auth/me');
                const data = await res.json();
                if (data.loggedIn) {
                    const cleanUsername = data.username.toLowerCase().trim();
                    const formattedName = data.username.charAt(0).toUpperCase() + data.username.slice(1);
                    document.getElementById('welcome-user').innerText = `🍿 Operator: ${formattedName}`;
                    
                    // 🛡️ IDENTITY GATING: Expose admin configurations explicitly for 'josh'
                    if (cleanUsername === 'josh') {
                        const adminBtn = document.getElementById('admin-action-btn');
                        if (adminBtn) {
                            adminBtn.style.display = 'inline-block';
                        }
                    }
                }
            } catch (e) {
                console.error("Profile name tracking sync lost.");
            }
        }

        async function loadMovies(page = 1) {
            currentCatalogPage = page;
            try {
                const grid = document.getElementById('movie-grid');
                const res = await fetch('/api/home-feed');
                const data = await res.json();
                const collections = data?.feed?.collections || [];

                if (collections.length > 0) {
                    grid.innerHTML = collections.map(renderFeedRow).join('');
                    document.getElementById('pagination-container').innerHTML = '';
                } else {
                    grid.innerHTML = `<div class="collection-empty" style="text-align: center; padding: 40px;">Your media library is currently empty. Click above to add content!</div>`;
                    document.getElementById('pagination-container').innerHTML = '';
                }
            } catch (err) {
                console.error("❌ Frontend failed to load pre-generated home feed:", err);
            }
        }

        async function updatePipelineStatus() {
            const monitorBox = document.getElementById('pipeline-monitor');
            const rowsContainer = document.getElementById('pipeline-rows');

            try {
                // Pass credentials so the requireAuth middleware can see session cookie
                const res = await fetch('/api/pipeline/status', {
                    credentials: 'include'
                });

                // If the server tells us we are unauthorized, hide the box and stop processing
                if (res.status === 401 || res.status === 403) {
                    monitorBox.style.display = 'none';
                    return;
                }

                const data = await res.json();
                let html = '';

                // Stage-based color mapping for consistent visual hierarchy
                const stageColors = {
                    downloading: '#f59e0b',
                    ingest: '#8b5cf6',
                    metadata: '#6366f1',
                    subtitles: '#06b6d4',
                    transcode: '#a855f7',
                    complete: '#10b981',
                    processing: '#64748b'
                };

                // Render active pipeline items
                if (data.success && data.pipeline && data.pipeline.length > 0) {
                    html += data.pipeline.map(item => {
                        const statusColor = stageColors[item.stage] || '#f59e0b';
                        const progress = typeof item.progress === 'number' ? item.progress : 50;
                        const displayProgress = typeof item.progress === 'number'
                            ? item.progress.toFixed(0) + '%'
                            : item.progress;

                        return `
                            <div style="background: #1a1f2e; padding: 14px 16px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; border-left: 4px solid ${statusColor}; margin-bottom: 8px;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div style="flex-grow: 1; min-width: 300px;">
                                        <div style="font-size: 0.95rem; color: #f8fafc; font-weight: 600;">${item.title}</div>
                                        <div style="font-size: 0.75rem; color: #94a3b8; margin-top: 2px;">Size: ${item.size}</div>
                                    </div>
                                    <div style="text-align: right;">
                                        <span style="background: ${statusColor}40; color: ${statusColor}; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; white-space: nowrap;">
                                            ${item.status}
                                        </span>
                                    </div>
                                </div>
                                <div style="width: 100%; height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden;">
                                    <div style="height: 100%; width: ${progress}%; background: ${statusColor}; transition: width 0.3s ease; border-radius: 3px;"></div>
                                </div>
                                <div style="display: flex; justify-content: space-between; align-items: center;">
                                    <span style="font-size: 0.75rem; color: #64748b;">Progress</span>
                                    <span style="font-size: 0.85rem; color: ${statusColor}; font-weight: 600;">${displayProgress}</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }

                // Render failed jobs (read-only on index)
                if (data.failures && data.failures.length > 0) {
                    html += '<div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid #334155;">';
                    html += '<div style="font-size: 0.85rem; color: #ef4444; font-weight: 600; margin-bottom: 10px;">⚠️ Failed Jobs</div>';
                    html += data.failures.map(failure => {
                        return `
                            <div style="background: #1a1f2e; padding: 12px 14px; border-radius: 8px; display: flex; flex-direction: column; gap: 6px; border-left: 4px solid #ef4444; margin-bottom: 8px;">
                                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                                    <div style="flex-grow: 1; min-width: 250px;">
                                        <div style="font-size: 0.95rem; color: #f8fafc; font-weight: 600;">${failure.title}</div>
                                        <div style="font-size: 0.75rem; color: #fca5a5; margin-top: 2px;">Error: ${failure.error}</div>
                                    </div>
                                    <span style="background: #ef444440; color: #ef4444; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; white-space: nowrap;">
                                        ${failure.status}
                                    </span>
                                </div>
                            </div>
                        `;
                    }).join('');
                    html += '</div>';
                }

                if (html) {
                    monitorBox.style.display = 'block';
                    rowsContainer.innerHTML = html;
                } else {
                    monitorBox.style.display = 'none';
                }
            } catch (err) {
                console.error('Failed querying system sync states.', err);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            hydrateUserProfileHeader();
            loadMovies(1);
            setInterval(updatePipelineStatus, 5000);
            updatePipelineStatus();
        });
    </script>
</body>
</html>
