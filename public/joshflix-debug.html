<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix Workspace Engine</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #020617; /* Cinema Black-Blue */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        /* Split Screen Configuration Layout */
        .workspace {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        .control-panel {
            background: #0f172a;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            z-index: 20;
        }

        .panel-row {
            display: flex;
            gap: 16px;
            margin-bottom: 12px;
            align-items: center;
        }

        .panel-row:last-child { margin-bottom: 0; }

        input[type="text"] {
            flex: 1;
            background: #1e293b;
            border: 1px solid #475569;
            color: #fff;
            padding: 10px 14px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 0.9rem;
        }

        button {
            background: #e50914; /* Joshflix Red */
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #b80710; }
        button.secondary { background: #334155; }
        button.secondary:hover { background: #1e293b; }

        /* File / Folder View Interface */
        .browser-container {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 16px;
        }

        .media-card {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .media-card:hover {
            transform: translateY(-2px);
            background: #334155;
            border-color: #e50914;
        }

        .media-icon { font-size: 1.5rem; }
        .media-details { overflow: hidden; }
        .media-title { font-weight: 600; font-size: 0.95rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Immersive Premium Video Stage Overlay */
        .theater-stage {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 50;
            display: none;
        }

        video { width: 100%; height: 100%; object-fit: contain; }

        .exit-theater-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 60;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
        }
        .exit-theater-btn:hover { opacity: 1; }

        .quality-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 60;
            background: #0284c7;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            pointer-events: none;
        }
        .hide-controls { opacity: 0 !important; cursor: none; }
    </style>
</head>
<body>

    <div class="workspace" id="workspaceContainer">
        <div class="control-panel">
            <div class="panel-row">
                <input type="text" id="folderTokenInput" placeholder="Paste Nextcloud Folder Share Token (e.g., fSEHqLFCmfoorRT)" value="fSEHqLFCmfoorRT">
                <button onclick="scanSharedFolder()">Scan Folder Contents</button>
            </div>
            <div class="panel-row">
                <input type="text" id="rawUrlInput" placeholder="Or paste direct stream URL asset manually here...">
                <button class="secondary" onclick="playRawUrl()">Stream Raw Target</button>
            </div>
        </div>

        <div class="browser-container">
            <h2 id="browserStatus">Ready to Scan</h2>
            <div class="media-grid" id="fileGrid">
                </div>
        </div>
    </div>

    <div class="theater-stage" id="theaterStage">
        <button class="exit-theater-btn" id="exitBtn" onclick="closeTheater()">⏮ Exit Playback</button>
        <div class="quality-badge" id="qualityTag">DIRECT NODE STREAM</div>
        <video id="cinemaVideo" controls playsinline></video>
    </div>

    <script>
        const videoEl = document.getElementById('cinemaVideo');
        const theaterStage = document.getElementById('theaterStage');
        const fileGrid = document.getElementById('fileGrid');
        const browserStatus = document.getElementById('browserStatus');
        const exitBtn = document.getElementById('exitBtn');
        const qualityTag = document.getElementById('qualityTag');

        // --- Nextcloud Public Folder WebDAV Parser ---
        // --- Nextcloud Public Share HTML Scraping Fallback Engine ---
async function scanSharedFolder() {
    const token = document.getElementById('folderTokenInput').value.trim();
    if(!token) return alert("Please present a valid public share token.");

    browserStatus.innerText = "Scraping Nextcloud Stream Vectors...";
    fileGrid.innerHTML = '';

    try {
        // We bypass the clunky WebDAV OPTIONS preflight block entirely by pulling the public share root page
        const targetEndpoint = `https://cloud.joshjames.site/s/${token}`;
        
        const response = await fetch(targetEndpoint, { method: 'GET' });
        if(!response.ok) throw new Error(`HTTP Status Error Context: ${response.status}`);
        
        const htmlText = await response.text();
        
        // Nextcloud embeds file layouts directly inside a server-side JSON variable block on the page 
        const fileRegex = /"name":"([^"]+\.(?:mp4|mkv|webm))"/gi;
        let match;
        let matchCount = 0;

        const uniqueFiles = new Set();
        while ((match = fileRegex.exec(htmlText)) !== null) {
            // Decode any escaped unicode characters out of the regex string output
            const fileName = JSON.parse(`"${match[1]}"`);
            uniqueFiles.add(fileName);
        }

        uniqueFiles.forEach(fileName => {
            matchCount++;
            createMediaCard(fileName, token);
        });

        browserStatus.innerText = matchCount > 0 ? `Discovered ${matchCount} Streamable Assets` : "Folder layout processed successfully, but no video media tracks matched current constraints.";

    } catch (err) {
        console.error(err);
        browserStatus.innerText = "Vector compilation failed. Ensure Cloudflare CORS rule is active.";
    }
}

        function parseAndRenderFiles(xmlStr, token) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
            const responses = xmlDoc.getElementsByTagName("d:response");
            
            let matchCount = 0;
            browserStatus.innerText = "Parsing Track Allocations...";

            for (let i = 0; i < responses.length; i++) {
                const href = responses[i].getElementsByTagName("d:href")[0].textContent;
                // Decode URL path characters
                const decodedPath = decodeURIComponent(href);
                const fileName = decodedPath.split('/').filter(Boolean).pop();

                // Only grab standard web compatible video structures matching your asset outputs
                if (fileName && (fileName.endsWith('.mp4') || fileName.endsWith('.mkv') || fileName.endsWith('.webm'))) {
                    matchCount++;
                    createMediaCard(fileName, token);
                }
            }

            browserStatus.innerText = matchCount > 0 ? `Discovered ${matchCount} Streamable Assets` : "Folder scanned successfully, but no web-compatible media files (.mp4, .mkv) were found.";
        }

        function createMediaCard(fileName, token) {
            const card = document.createElement('div');
            card.className = 'media-card';
            
            // Generate direct stream download string structure matching Nextcloud specs
            const streamUrl = `https://cloud.joshjames.site/s/${token}/download?path=%2F&files=${encodeURIComponent(fileName)}`;
            
            card.onclick = () => launchTheater(streamUrl, fileName);
            card.innerHTML = `
                <div class="media-icon">🎬</div>
                <div class="media-details">
                    <div class="media-title">${fileName}</div>
                </div>
            `;
            fileGrid.appendChild(card);
        }

        // --- Playback Management Pipelines ---
        function playRawUrl() {
            const url = document.getElementById('rawUrlInput').value.trim();
            if(!url) return alert("Pasted URL vector target index empty.");
            launchTheater(url, "Raw URL Resource");
        }

        function launchTheater(url, title) {
            theaterStage.style.display = 'block';
            qualityTag.innerText = `STREAMING: ${title}`;
            videoEl.src = url;
            videoEl.play().catch(e => console.log("Autoplay click requirement capture initialized."));
            resetControlVisibility();
        }

        function closeTheater() {
            videoEl.pause();
            videoEl.src = '';
            theaterStage.style.display = 'none';
            clearTimeout(mouseMoveTimeout);
            document.body.style.cursor = 'default';
        }

        // --- Custom UI Fading Overlays Utilities ---
        let mouseMoveTimeout;
        function resetControlVisibility() {
            if (theaterStage.style.display !== 'block') return;
            
            exitBtn.classList.remove('hide-controls');
            qualityTag.classList.remove('hide-controls');
            document.body.style.cursor = 'default';
            
            clearTimeout(mouseMoveTimeout);
            if (!videoEl.paused) {
                mouseMoveTimeout = setTimeout(() => {
                    exitBtn.classList.add('hide-controls');
                    qualityTag.classList.add('hide-controls');
                    document.body.style.cursor = 'none';
                }, 3000); 
            }
        }

        document.addEventListener('mousemove', resetControlVisibility);
        videoEl.addEventListener('play', resetControlVisibility);
        videoEl.addEventListener('pause', resetControlVisibility);

        // Keyboard Controls
        document.addEventListener('keydown', (e) => {
            if (theaterStage.style.display === 'block') {
                if (e.code === 'Space') {
                    e.preventDefault();
                    if (videoEl.paused) videoEl.play(); else videoEl.pause();
                }
                if (e.code === 'Escape') {
                    closeTheater();
                }
            }
        });
        
        // Run scan automatically on load for your token container
        scanSharedFolder();
    </script>
</body>
</html>
