<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix Player</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #020617; /* Deep cinema black-blue */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Seamless Edge-to-Edge Player */
        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Preserves original movie aspect ratios perfectly */
            outline: none;
        }

        /* Premium Floating Overlay Back Button */
        .back-overlay-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            opacity: 0.3; /* Subtle presence until hovered */
        }

        .back-overlay-btn:hover {
            opacity: 1;
            background: rgba(15, 23, 42, 0.9);
            transform: translateX(-2px);
        }

        /* Quality Indicator Tag */
        .quality-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            background: rgba(229, 9, 20, 0.8); /* Joshflix Red */
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Fade utilities for overlay elements when mouse is still */
        .hide-controls {
            opacity: 0 !important;
            cursor: none;
        }
    </style>
</head>
<body>

    <div class="player-container" id="stage">
        <a href="/" class="back-overlay-btn" id="backBtn">⏮ Back to Library</a>
        <div class="quality-badge" id="qualityTag">DETECTING...</div>
        
        <video id="cinemaVideo" controls autoplay playsinline></video>
    </div>

    <script>
        const videoEl = document.getElementById('cinemaVideo');
const qualityTag = document.getElementById('qualityTag');
const backBtn = document.getElementById('backBtn');
const stage = document.getElementById('stage');

// Extract query parameters (e.g., player.html?id=123)
const params = new URLSearchParams(window.location.search);
const movieId = params.get('id');

async function initializePremiumStream() {
    if (!movieId) {
        alert("No media identifier provided.");
        window.location.href = "/";
        return;
    }

    // Step 1: Detect Connection Footprint via Browser Metrics
    let speedMbps = 10; // High default fallback
    
    if (navigator.connection && navigator.connection.downlink) {
        speedMbps = navigator.connection.downlink;
    } else {
        // Fallback Probe: Test download duration of a tiny asset file if api isn't supported
        const startTime = Date.now();
        try {
            await fetch('/favicon.ico', { cache: 'no-store' });
            const durationSec = (Date.now() - startTime) / 1000;
            if (durationSec > 0) speedMbps = (0.05 / durationSec) * 8; // Approx calculation
        } catch(e) {}
    }

    // Step 2: Query our backend API for the target movie metadata profile
    try {
        const response = await fetch(`/api/movies/${movieId}`);
        const movie = await response.json();
        
        let targetStreamUrl = movie.file1080p; // Default baseline route
        
        // Step 3: Stream Selection Matrix
        if (speedMbps < 2.5 && movie.file480p) {
            // Cellular/Low Bandwidth Constraint Profile (< 2.5 Mbps)
            targetStreamUrl = movie.file480p;
            qualityTag.innerText = "SD 480P (LOW BANDWIDTH)";
            qualityTag.style.background = "#eab308"; // Warning Yellow
        } else if (speedMbps < 6.0 && movie.file720p) {
            // Mobile HD Profile (2.5 Mbps - 6.0 Mbps)
            targetStreamUrl = movie.file720p;
            qualityTag.innerText = "HD 720P (BALANCED)";
            qualityTag.style.background = "#3b82f6"; // Blue
        } else {
            // Unrestricted Premium Tier Pipeline (> 6.0 Mbps)
            targetStreamUrl = movie.file1080p || movie.fileSource;
            qualityTag.innerText = "FHD 1080P (SOURCE)";
            qualityTag.style.background = "#e50914"; // Joshflix Red
        }

        // Mount the stream path cleanly and fire up playback bounds
        videoEl.src = targetStreamUrl;
        
        // Attempt immediate playback block confirmation
        videoEl.play().catch(err => {
            console.log("🔒 Interaction security lock met. Awaiting manual trigger user frame tap.");
        });

    } catch (err) {
        console.error("Pipeline failure fetching media stream layout targets:", err);
        qualityTag.innerText = "STREAM CORRUPTED";
    }
}

// Custom UI Polish: Auto-hide Mouse Cursor and Navigation interface when video is playing
let mouseMoveTimeout;
function resetControlVisibility() {
    backBtn.classList.remove('hide-controls');
    qualityTag.classList.remove('hide-controls');
    stage.style.cursor = 'default';
    
    clearTimeout(mouseMoveTimeout);
    if (!videoEl.paused) {
        mouseMoveTimeout = setTimeout(() => {
            backBtn.classList.add('hide-controls');
            qualityTag.classList.add('hide-controls');
            stage.style.cursor = 'none';
        }, 3000); // Hide interfaces after 3 seconds of perfect stillness
    }
}

document.addEventListener('mousemove', resetControlVisibility);
videoEl.addEventListener('play', resetControlVisibility);
videoEl.addEventListener('pause', resetControlVisibility);

// Keyboard Intercept Controls: Spacebar toggles Play/Pause state seamlessly
document.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        e.preventDefault(); // Stop standard browser page down scrolling actions
        if (videoEl.paused) videoEl.play(); else videoEl.pause();
    }
});

// Trigger setup on mounting
initializePremiumStream();
    </script>
</body>
</html>
