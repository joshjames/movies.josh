<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 960px;
            width: 100%;
        }
        h1 {
            font-size: 1.3rem;
            margin-bottom: 12px;
            color: #f1f5f9;
            line-height: 1.4;
        }
        .video-wrapper {
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            aspect-ratio: 16 / 9;
            width: 100%;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
        }
        video::cue {
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 4vw; /* Scales text fluidly relative to smaller display layouts */
        }
        .controls-row {
            margin-top: 15px;
            display: flex;
            flex-direction: column; /* Stack controls vertically on mobile platforms */
            gap: 12px;
        }
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        select {
            background-color: #1e293b;
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 8px 12px;
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            font-size: 0.85rem;
            max-width: 60%;
        }
        .meta-container {
            margin-top: 20px;
            background-color: #1e293b;
            padding: 16px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .meta-header-line {
            font-size: 0.85rem;
            color: #3b82f6;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }
        .plot-text {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.5;
        }
        .error-msg {
            color: #f43f5e;
            background-color: rgba(244, 63, 94, 0.1);
            padding: 15px;
            border-radius: 6px;
            border: 1px solid rgba(244, 63, 94, 0.2);
            text-align: center;
            margin-top: 20px;
        }

        /* Scale adjustments for desktop */
        @media(min-width: 640px) {
            body { padding: 20px; }
            h1 { font-size: 1.6rem; }
            .controls-row { flex-direction: row; justify-content: space-between; align-items: center; }
            .control-group { width: auto; gap: 15px; }
            video::cue { font-size: 1.1rem; }
            select { font-size: 0.9rem; max-width: none; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="movieTitle">Loading Movie...</h1>

        <div class="video-wrapper">
            <video id="videoPlayer" controls crossorigin="anonymous" playsinline></video>
        </div>

        <div class="controls-row">
            <div class="control-group">
                <a href="/" style="color: #3b82f6; text-decoration: none; font-size: 0.9rem; font-weight: 500;">← Back to Library</a>
            </div>
            <div class="control-group">
                <label for="quality" style="font-size: 0.9rem; color: #94a3b8;">Stream Profile:</label>
                <select id="quality"></select>
            </div>
        </div>

        <div class="meta-container" id="metaContainer" style="display: none;">
            <div class="meta-header-line" id="metaGenre">SUMMARY</div>
            <div class="plot-text" id="moviePlot"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const movieId = urlParams.get('id');

            if (!movieId) {
                document.getElementById('movieTitle').innerText = "No Movie Selected";
                const container = document.querySelector('.container');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'error-msg';
                errorDiv.innerText = "Error: Missing valid movie identifier context string.";
                container.appendChild(errorDiv);
                return;
            }

            document.getElementById('movieTitle').innerText = decodeURIComponent(movieId).replace(/[-_]/g, ' ');

            const videoPlayer = document.getElementById('videoPlayer');
            const qualitySelect = document.getElementById('quality');

            qualitySelect.options.add(new Option('🚀 Direct Source (No Transcode / MP4 Fallback)', 'direct'));
            qualitySelect.options.add(new Option('Transcode: 1080p Live', '1080p'));
            qualitySelect.options.add(new Option('Transcode: 720p Live', '720p'));

            qualitySelect.value = 'direct';

            // Fetch library list data to populate metadata info card fields on active display
            async function appendRichMetaData() {
                try {
                    const res = await fetch('/api/movies');
                    const movies = await res.json();
                    const activeMovie = movies.find(m => m.id === encodeURIComponent(movieId));
                    
                    if (activeMovie && activeMovie.plot) {
                        document.getElementById('moviePlot').innerText = activeMovie.plot;
                        if (activeMovie.genre) {
                            document.getElementById('metaGenre').innerText = activeMovie.genre;
                        }
                        document.getElementById('metaContainer').style.display = 'block';
                    }
                } catch(e) {
                    console.log("Meta frame load blocked:", e);
                }
            }
            appendRichMetaData();

            function loadSubtitles() {
                const existingTracks = videoPlayer.querySelectorAll('track');
                existingTracks.forEach(track => track.remove());

                const track = document.createElement('track');
                track.kind = 'subtitles';
                track.label = 'English';
                track.srclang = 'en';
                track.src = `/api/subtitles/${encodeURIComponent(movieId)}`;
                track.default = true;
                
                videoPlayer.appendChild(track);
            }

            function changeQuality() {
                const profile = qualitySelect.value;
                const currentTime = videoPlayer.currentTime;
                const isPaused = videoPlayer.paused;

                let streamUrl = (profile === 'direct') 
                    ? `/api/raw-file/${encodeURIComponent(movieId)}`
                    : `/stream/${encodeURIComponent(movieId)}/${profile}.m3u8`;

                videoPlayer.src = streamUrl;
                videoPlayer.load();
                loadSubtitles();
                videoPlayer.currentTime = currentTime;

                if (!isPaused) {
                    videoPlayer.play().catch(err => console.log("Playback blocked:", err));
                }
            }

            qualitySelect.addEventListener('change', changeQuality);
            changeQuality();
        });
    </script>
</body>
</html>
