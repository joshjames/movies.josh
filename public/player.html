<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix Standalone Diagnostic Player</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #020617; 
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; 
            outline: none;
        }

        .back-overlay-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            opacity: 0.3; 
        }

        .back-overlay-btn:hover {
            opacity: 1;
            background: rgba(15, 23, 42, 0.9);
            transform: translateX(-2px);
        }

        .quality-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            background: rgba(229, 9, 20, 0.8); 
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .hide-controls {
            opacity: 0 !important;
            cursor: none;
        }

        .next-overlay-btn {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0.3;
        }

        .next-overlay-btn:hover {
            opacity: 1;
            background: rgba(15, 23, 42, 0.9);
            transform: translateX(2px);
        }
    </style>
</head>
<body>

    <div class="player-container" id="stage">
        <a href="/" class="back-overlay-btn" id="backBtn">⏮ Back to Main Desk</a>
        <button class="next-overlay-btn hide-controls" id="nextBtn">Next Episode ⏭</button>
        
        <div class="quality-badge" id="qualityTag">DETECTING...</div>
        <video id="cinemaVideo" controls autoplay playsinline></video>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        let seasonParam = params.get('season');
        let episodeParam = params.get('episode');
        const playfileParam = params.get('playfile'); // Raw bypass string targeting direct files

        let currentTvPlaylist = [];
        let currentTrackIndex = -1;
        const videoEl = document.getElementById('cinemaVideo');
        const qualityTag = document.getElementById('qualityTag');
        const backBtn = document.getElementById('backBtn');
        const nextBtn = document.getElementById('nextBtn');
        const stage = document.getElementById('stage');

        let currentMediaId = movieId; 
        let lastSavedTime = 0;
        const SYNC_INTERVAL_MS = 5000; 
        
        // Safe cookie evaluation block for standalone testing contexts
        let activeUserProfile = 'guest';
        try {
            activeUserProfile = document.cookie
                .split('; ')
                .find(row => row.startsWith('user_profile='))
                ?.split('=')[1] || 'guest';
        } catch(e) {
            console.warn("Cookie runtime context inaccessible; defaulting profile state execution layer.");
        }

        if (movieId && seasonParam) {
            backBtn.href = `series.html?id=${encodeURIComponent(movieId)}`;
            backBtn.innerText = "⏮ Back to Show";
        }

        function loadSubtitles() {
            if (playfileParam) return; // Completely bypass backend dependencies
            const existingTracks = videoEl.querySelectorAll('track');
            existingTracks.forEach(track => track.remove());

            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = 'English';
            track.srclang = 'en';
            track.src = `/api/subtitles/${encodeURIComponent(movieId)}`;
            track.default = true; 
            videoEl.appendChild(track);
        }

        async function applyResumeMarker() {
            if (playfileParam || window.location.protocol === 'file:') return; 
            try {
                const res = await fetch(`/api/profile/playback/state?mediaId=${encodeURIComponent(currentMediaId)}`, {
                    headers: { 'x-user-profile': activeUserProfile }
                });
                const data = await res.json();
                
                if (data.success && data.position > 5) {
                    if (videoEl.duration && data.position < videoEl.duration - 30) {
                        videoEl.currentTime = data.position;
                    } else if (!videoEl.duration) {
                        videoEl.currentTime = data.position;
                    }
                }
            } catch (e) {
                console.error("Playback restoration call dropped:", e);
            }
        }

        videoEl.addEventListener('timeupdate', () => {
            if (playfileParam || window.location.protocol === 'file:') return; 
            const currentTime = videoEl.currentTime;
            const now = Date.now();

            if (now - lastSavedTime > SYNC_INTERVAL_MS) {
                lastSavedTime = now;
                fetch('/api/profile/playback/sync', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-user-profile': activeUserProfile
                    },
                    body: JSON.stringify({ mediaId: currentMediaId, position: currentTime })
                }).catch(err => console.error("Heartbeat frame sync drop:", err));
            }
        });

        videoEl.addEventListener('loadedmetadata', applyResumeMarker);

        async function initializePremiumStream() {
            // =========================================================================
            // 🚨 STANDALONE DECOUPLED DECOY INTERCEPT INTERFACE
            // =========================================================================
            if (playfileParam) {
                console.log(`🔑 Standalone Mode: Loading explicit raw context line [${playfileParam}]`);
                nextBtn.style.display = 'none';
                backBtn.href = "#";
                backBtn.addEventListener('click', (e) => { e.preventDefault(); alert('Standalone mode running. Navigate manually or refresh.'); });
                
                qualityTag.innerText = "STANDALONE LOCAL BYPASS";
                qualityTag.style.background = "#d97706"; 
                
                // Inject the parameter raw string with zero internal route prefix assumptions
                videoEl.src = playfileParam;
                videoEl.play().catch((err) => {
                    console.error("Local path resource failed loading initialization streams:", err);
                    qualityTag.innerText = "LOCAL RESOURCE ERROR";
                });
                return;
            }
            // =========================================================================

            if (!movieId) {
                alert("No media identifier provided.");
                window.location.href = "/";
                return;
            }

            if (seasonParam && episodeParam) {
                try {
                    const cleanFolder = movieId.replace('series/', '');
                    const response = await fetch(`/api/series/${encodeURIComponent(cleanFolder)}`);
                    const showData = await response.json();
                    
                    const targetSeason = showData.seasons ? showData.seasons[seasonParam] : null;
                    currentTvPlaylist = targetSeason ? targetSeason.episodes : [];
                    currentTrackIndex = currentTvPlaylist.findIndex(ep => ep.episodeNumber == parseInt(episodeParam, 10));

                    if (currentTrackIndex !== -1) {
                        playEpisodeIndex(currentTrackIndex);
                    } else {
                        alert("Target episode track index bounds out of file system alignment.");
                    }
                } catch (err) {
                    console.error("TV context initialization fault:", err);
                }
                return;
            }

            nextBtn.style.display = 'none';
            currentMediaId = movieId; 
            setupMoviePlayback();
        }

        async function setupMoviePlayback() {
            let speedMbps = 10;
            if (navigator.connection && navigator.connection.downlink) speedMbps = navigator.connection.downlink;

            try {
                const response = await fetch(`/api/movies/${movieId}`);
                const movie = await response.json();
                let targetStreamUrl = '';
                
                const resolveStreamSource = (fileUrl) => {
                    if (!fileUrl) return '';
                    if (fileUrl.startsWith('http://') || fileUrl.startsWith('https://')) {
                        return fileUrl;
                    }
                    return fileUrl.replace('/movies/', '/movie-assets/');
                };

                if (speedMbps < 2.5 && movie.file480p) {
                    targetStreamUrl = resolveStreamSource(movie.file480p);
                    qualityTag.innerText = "SD 480P (LOW BANDWIDTH)";
                } else if (speedMbps < 6.0 && movie.file720p) {
                    targetStreamUrl = resolveStreamSource(movie.file720p);
                    qualityTag.innerText = "HD 720P (BALANCED)";
                } else {
                    const fallbackFile = movie.file1080p || movie.fileSource || '';
                    targetStreamUrl = resolveStreamSource(fallbackFile);
                    qualityTag.innerText = "FHD 1080P (SOURCE)";
                }

                videoEl.src = targetStreamUrl;
                loadSubtitles();
                videoEl.play().catch(() => {});
            } catch (err) {
                qualityTag.innerText = "STREAM CORRUPTED";
            }
        }

        function getNextAvailableIndex() {
            if (currentTrackIndex === -1 || currentTvPlaylist.length === 0) return -1;
            for (let i = currentTrackIndex + 1; i < currentTvPlaylist.length; i++) {
                if (currentTvPlaylist[i].available) return i;
            }
            return -1;
        }

        function playEpisodeIndex(index) {
            if (index < 0 || index >= currentTvPlaylist.length) return;
            
            const episode = currentTvPlaylist[index];
            currentTrackIndex = index;

            const cleanFolder = movieId.replace('series/', '');
            currentMediaId = `${cleanFolder}-S${seasonParam}E${episode.episodeNumber}`;

            videoEl.src = `/movie-assets/${episode.localRelativePath}`;
            qualityTag.innerText = `TV: S${seasonParam}E${episode.episodeNumber}`;
            qualityTag.style.background = "#6366f1"; 

            const newUrl = `player.html?id=${encodeURIComponent(movieId)}&season=${seasonParam}&episode=${episode.episodeNumber}`;
            window.history.replaceState({ path: newUrl }, '', newUrl);

            updateNextButtonVisibility();
            applyResumeMarker();

            videoEl.play().catch(() => {});
        }

        function updateNextButtonVisibility() {
            if (getNextAvailableIndex() !== -1) {
                nextBtn.style.display = 'flex';
            } else {
                nextBtn.style.display = 'none'; 
            }
        }

        nextBtn.addEventListener('click', () => {
            const nextIdx = getNextAvailableIndex();
            if (nextIdx !== -1) {
                playEpisodeIndex(nextIdx);
            }
        });

        videoEl.addEventListener('ended', () => {
            const nextIdx = getNextAvailableIndex();
            if (nextIdx !== -1) {
                playEpisodeIndex(nextIdx);
            } else {
                qualityTag.innerText = "SEASON ENDED";
                qualityTag.style.background = "#22c55e";
            }
        });

        let mouseMoveTimeout;
        function resetControlVisibility() {
            backBtn.classList.remove('hide-controls');
            nextBtn.classList.remove('hide-controls');
            qualityTag.classList.remove('hide-controls');
            stage.style.cursor = 'default';
            
            clearTimeout(mouseMoveTimeout);
            if (!videoEl.paused) {
                mouseMoveTimeout = setTimeout(() => {
                    backBtn.classList.add('hide-controls');
                    nextBtn.classList.add('hide-controls');
                    qualityTag.classList.add('hide-controls');
                    stage.style.cursor = 'none';
                }, 3000); 
            }
        }

        document.addEventListener('mousemove', resetControlVisibility);
        videoEl.addEventListener('play', resetControlVisibility);
        videoEl.addEventListener('pause', resetControlVisibility);

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                if (videoEl.paused) videoEl.play(); else videoEl.pause();
            }
            if (e.key.toLowerCase() === 'n') {
                const nextIdx = getNextAvailableIndex();
                if (nextIdx !== -1) playEpisodeIndex(nextIdx);
            }
        });

        initializePremiumStream();
    </script>
</body>
</html>
