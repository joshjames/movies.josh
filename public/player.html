<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix Player</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #020617; /* Deep cinema black-blue */
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        /* Seamless Edge-to-Edge Player */
        .player-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Preserves original movie aspect ratios perfectly */
            outline: none;
        }

        /* Premium Floating Overlay Back Button */
        .back-overlay-btn {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #f1f5f9;
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            opacity: 0.3; /* Subtle presence until hovered */
        }

        .back-overlay-btn:hover {
            opacity: 1;
            background: rgba(15, 23, 42, 0.9);
            transform: translateX(-2px);
        }

        /* Quality Indicator Tag */
        .quality-badge {
            position: absolute;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            background: rgba(229, 9, 20, 0.8); /* Joshflix Red */
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Fade utilities for overlay elements when mouse is still */
        .hide-controls {
            opacity: 0 !important;
            cursor: none;
        }
    </style>
</head>
<body>

    <div class="player-container" id="stage">
        <a href="/" class="back-overlay-btn" id="backBtn">⏮ Back to Library</a>
        <div class="quality-badge" id="qualityTag">DETECTING...</div>
        
        <video id="cinemaVideo" controls autoplay playsinline></video>
    </div>

    <script>
        // 1. Declare URL Params FIRST so they are available to everything below
        const params = new URLSearchParams(window.location.search);
        const movieId = params.get('id');
        const seasonParam = params.get('season');
        const episodeParam = params.get('episode');

        // 2. Initialize UI Element References and State Trackers
        let currentTvPlaylist = [];
        let currentTrackIndex = -1;
        const videoEl = document.getElementById('cinemaVideo');
        const qualityTag = document.getElementById('qualityTag');
        const backBtn = document.getElementById('backBtn');
        const stage = document.getElementById('stage');

        // Update the Back Button dynamically if viewing a TV show to return to the Show details page
        if (movieId && seasonParam) {
            backBtn.href = `series.html?id=${encodeURIComponent(movieId)}`;
            backBtn.innerText = "⏮ Back to Show";
        }

        // --- Subtitle Ingestion Function ---
        function loadSubtitles() {
            const existingTracks = videoEl.querySelectorAll('track');
            existingTracks.forEach(track => track.remove());

            const track = document.createElement('track');
            track.kind = 'subtitles';
            track.label = 'English';
            track.srclang = 'en';
            track.src = `/api/subtitles/${encodeURIComponent(movieId)}`;
            track.default = true; 
            
            videoEl.appendChild(track);
        }

        async function initializePremiumStream() {
            if (!movieId) {
                alert("No media identifier provided.");
                window.location.href = "/";
                return;
            }

            // --- CASE A: SYSTEM PROCESSING TELEVISION ASSET TRACK ---
            if (seasonParam && episodeParam) {
                try {
                    const cleanFolder = movieId.replace('series/', '');
                    const response = await fetch(`/api/series/${encodeURIComponent(cleanFolder)}`);
                    const showData = await response.json();
                    
                    // Pull episodes array out of the requested season structure
                    const targetSeason = showData.seasons ? showData.seasons[seasonParam] : null;
                    currentTvPlaylist = targetSeason ? targetSeason.episodes : [];
                    
                    // FIX: Match against 'episodeNumber' to line up with series-sanitizer schema
                    currentTrackIndex = currentTvPlaylist.findIndex(ep => ep.episodeNumber == parseInt(episodeParam, 10));

                    if (currentTrackIndex !== -1) {
                        playEpisodeIndex(currentTrackIndex);
                    } else {
                        alert("Target episode track index bounds out of file system alignment.");
                    }
                } catch (err) {
                    console.error("TV context initialization fault:", err);
                }
                return;
            }

            // --- CASE B: STANDARD MOVIE INGESTION PASS ---
            let speedMbps = 10;
            if (navigator.connection && navigator.connection.downlink) speedMbps = navigator.connection.downlink;

            try {
                const response = await fetch(`/api/movies/${movieId}`);
                const movie = await response.json();
                let targetStreamUrl = '';
                
                if (speedMbps < 2.5 && movie.file480p) {
                    targetStreamUrl = movie.file480p.replace('/movies/', '/movie-assets/');
                    qualityTag.innerText = "SD 480P (LOW BANDWIDTH)";
                } else if (speedMbps < 6.0 && movie.file720p) {
                    targetStreamUrl = movie.file720p.replace('/movies/', '/movie-assets/');
                    qualityTag.innerText = "HD 720P (BALANCED)";
                } else {
                    const fallbackFile = movie.file1080p || movie.fileSource || '';
                    targetStreamUrl = fallbackFile.replace('/movies/', '/movie-assets/');
                    qualityTag.innerText = "FHD 1080P (SOURCE)";
                }

                videoEl.src = targetStreamUrl;
                loadSubtitles();
                videoEl.play().catch(() => {});
            } catch (err) {
                qualityTag.innerText = "STREAM CORRUPTED";
            }
        }

        /**
         * TV Playback Worker Logic Engine
         */
        function playEpisodeIndex(index) {
            if (index < 0 || index >= currentTvPlaylist.length) return;
            
            const episode = currentTvPlaylist[index];
            currentTrackIndex = index;

            // FIX: Map using 'localRelativePath' to match the sanitizer engine outputs
            videoEl.src = `/movie-assets/${episode.localRelativePath}`;
            qualityTag.innerText = `TV: S${seasonParam}E${episode.episodeNumber}`;
            qualityTag.style.background = "#6366f1"; // Purple accent tag

            // Safely update browser address history so refreshing doesn't lose your place
            const newUrl = `player.html?id=${encodeURIComponent(movieId)}&season=${seasonParam}&episode=${episode.episodeNumber}`;
            window.history.replaceState({ path: newUrl }, '', newUrl);

            videoEl.play().catch(() => {});
        }

        // --- AUTOMATIC CONTINUOUS SEQUENCE AUTOPLAY TRIGGER ---
        videoEl.addEventListener('ended', () => {
            if (currentTvPlaylist.length > 0 && currentTrackIndex !== -1) {
                const nextIndex = currentTrackIndex + 1;
                
                // Find the next available episode (skips missing files if any exist)
                let nextEpIndex = -1;
                for (let i = nextIndex; i < currentTvPlaylist.length; i++) {
                    if (currentTvPlaylist[i].available) {
                        nextEpIndex = i;
                        break;
                    }
                }

                if (nextEpIndex !== -1) {
                    console.log("🎬 Active track sequence completed. Advancing to next episode...");
                    playEpisodeIndex(nextEpIndex);
                } else {
                    qualityTag.innerText = "SEASON ENDED";
                    qualityTag.style.background = "#22c55e"; // Green tag
                }
            }
        });

        // Mouse Interface Fade Handling
        let mouseMoveTimeout;
        function resetControlVisibility() {
            backBtn.classList.remove('hide-controls');
            qualityTag.classList.remove('hide-controls');
            stage.style.cursor = 'default';
            
            clearTimeout(mouseMoveTimeout);
            if (!videoEl.paused) {
                mouseMoveTimeout = setTimeout(() => {
                    backBtn.classList.add('hide-controls');
                    qualityTag.classList.add('hide-controls');
                    stage.style.cursor = 'none';
                }, 3000); 
            }
        }

        document.addEventListener('mousemove', resetControlVisibility);
        videoEl.addEventListener('play', resetControlVisibility);
        videoEl.addEventListener('pause', resetControlVisibility);

        // Keyboard Spacebar Play/Pause intercept
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault(); 
                if (videoEl.paused) videoEl.play(); else videoEl.pause();
            }
        });

        // Run setup on initialization
        initializePremiumStream();
    </script>
</body>
</html>
