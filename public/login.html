<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnyMovie - Login</title>
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .login-logo-wrapper {
            width: 100%;
            max-width: 260px;
            margin: 0 auto 20px auto;
            display: block;
        }

        .login-logo-wrapper svg {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 8px 0;
            margin-top: 0;
            margin-bottom: 8px;
            color: #f1f5f9;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }

        #nameFieldGroup {
            display: none;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: #020617;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2563eb;
        }

        .submit-btn {
            background: #e50914; 
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #b90710;
        }

        .toggle-box {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .toggle-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .utility-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: -8px;
            margin-bottom: 8px;
            font-size: 0.82rem;
        }

        .utility-link {
            color: #38bdf8;
            text-decoration: none;
            cursor: pointer;
        }

        .utility-link:hover {
            text-decoration: underline;
        }

        .banner {
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            line-height: 1.4;
        }
        .banner-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #f87171;
        }
        .banner-success {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid #10b981;
            color: #34d399;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="logo-wrapper" onclick="window.location.href='/';">
        <svg viewBox="0 0 500 135" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <path id="textArchPath" d="M 50,85 Q 250,35 450,85" fill="none" />
                
                <filter id="cinematicGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.9" />
                    <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#b91c1c" flood-opacity="0.4" />
                </filter>
            </defs>

            <g filter="url(#cinematicGlow)">
                <text font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
                    font-size="52" 
                    font-weight="900" 
                    letter-spacing="5" 
                    fill="#e50914">
                    <textPath href="#textArchPath" startOffset="50%" text-anchor="middle">
                        ANYMOVIE
                    </textPath>
                </text>
            </g>

            <text x="50%" 
                y="118" 
                font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" 
                font-size="16" 
                font-weight="700" 
                letter-spacing="14" 
                fill="#ffffff" 
                text-anchor="middle"
                opacity="0.9">
                ONLINE
            </text>
        </svg>
</div>

        <h1 id="form-title">Welcome Back</h1>
        <div class="subtitle" id="form-subtitle">Enter your details to Signup for Anymovie</div>

        <div class="banner" id="alertBlock"></div>

        <form id="authForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="usernameIn" id="usernameLabel">Email Address</label>
                <input type="text" id="usernameIn" required autocomplete="username">
            </div>

            <div class="form-group" id="nameFieldGroup">
                <label for="nameIn">Full Name</label>
                <input type="text" id="nameIn" autocomplete="name">
            </div>

            <div class="form-group">
                <label for="passwordIn">Password</label>
                <input type="password" id="passwordIn" required autocomplete="current-password">
            </div>

            <div class="form-group" id="confirmPasswordGroup" style="display:none;">
                <label for="confirmPasswordIn">Confirm New Password</label>
                <input type="password" id="confirmPasswordIn" autocomplete="new-password">
            </div>

            <div class="utility-row" id="utilityRow">
                <span class="utility-link" id="forgotPasswordLink" onclick="enterResetRequestMode()">Forgot password?</span>
                <span class="utility-link" id="backToLoginLink" onclick="exitResetMode()" style="display:none;">Back to login</span>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Login</button>
        </form>

        <div class="toggle-box">
            <span id="toggleText">New to Anymovie?</span>
            <span class="toggle-link" id="toggleLink" onclick="toggleAuthMode()">Create a profile</span>
        </div>
    </div>

    <script>
        let isLoginMode = true;
        let isResetRequestMode = false;
        let resetToken = '';
        let resetUser = '';

        function isResetConfirmMode() {
            return Boolean(resetToken && resetUser);
        }

        function updateModeUI() {
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const nameGroup = document.getElementById('nameFieldGroup');
            const nameInput = document.getElementById('nameIn');
            const userInput = document.getElementById('usernameIn');
            const usernameLabel = document.getElementById('usernameLabel');
            const passwordInput = document.getElementById('passwordIn');
            const confirmGroup = document.getElementById('confirmPasswordGroup');
            const confirmInput = document.getElementById('confirmPasswordIn');
            const utilityRow = document.getElementById('utilityRow');
            const forgotPasswordLink = document.getElementById('forgotPasswordLink');
            const backToLoginLink = document.getElementById('backToLoginLink');
            const toggleBox = document.querySelector('.toggle-box');

            if (isResetConfirmMode()) {
                title.innerText = 'Set a New Password';
                subtitle.innerText = 'Enter your new password below.';
                submitBtn.innerText = 'Update Password';

                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');

                usernameLabel.innerText = 'Email Address';
                userInput.setAttribute('type', 'text');
                userInput.value = resetUser;
                userInput.setAttribute('readonly', 'true');

                passwordInput.value = '';
                passwordInput.setAttribute('required', 'true');
                passwordInput.setAttribute('autocomplete', 'new-password');
                document.querySelector('label[for="passwordIn"]').innerText = 'New Password';

                confirmGroup.style.display = 'flex';
                confirmInput.setAttribute('required', 'true');

                utilityRow.style.display = 'none';
                toggleBox.style.display = 'none';
                return;
            }

            userInput.removeAttribute('readonly');
            userInput.value = userInput.value || '';
            userInput.setAttribute('type', 'text');
            passwordInput.setAttribute('autocomplete', isResetRequestMode ? 'off' : (isLoginMode ? 'current-password' : 'new-password'));
            document.querySelector('label[for="passwordIn"]').innerText = 'Password';

            confirmGroup.style.display = 'none';
            confirmInput.removeAttribute('required');
            confirmInput.value = '';

            toggleBox.style.display = 'block';
            utilityRow.style.display = 'flex';

            if (isResetRequestMode) {
                title.innerText = 'Reset Password';
                subtitle.innerText = 'Enter your email and we will send you a reset link.';
                submitBtn.innerText = 'Send Reset Email';
                usernameLabel.innerText = 'Email Address';

                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');

                passwordInput.removeAttribute('required');
                passwordInput.value = '';
                passwordInput.parentElement.style.display = 'none';

                toggleText.innerText = 'Remembered your password?';
                toggleLink.innerText = 'Sign in here';

                forgotPasswordLink.style.display = 'none';
                backToLoginLink.style.display = 'inline';
                return;
            }

            passwordInput.parentElement.style.display = 'flex';
            passwordInput.setAttribute('required', 'true');
            forgotPasswordLink.style.display = isLoginMode ? 'inline' : 'none';
            backToLoginLink.style.display = 'none';

            if (isLoginMode) {
                title.innerText = 'Welcome Back';
                subtitle.innerText = 'Enter your details to start streaming';
                submitBtn.innerText = 'Login to Anymovie';
                usernameLabel.innerText = 'Email or Username';
                toggleText.innerText = 'New to Anymovie?';
                toggleLink.innerText = 'Create a profile';

                nameGroup.style.display = 'none';
                nameInput.removeAttribute('required');
            } else {
                title.innerText = 'Provision Profile';
                subtitle.innerText = 'Setup your new profile';
                submitBtn.innerText = 'Register your account';
                usernameLabel.innerText = 'Email Address';
                toggleText.innerText = 'Already registered?';
                toggleLink.innerText = 'Sign in here';

                nameGroup.style.display = 'flex';
                nameInput.setAttribute('required', 'true');
            }
        }

        // Auto-check on initialization to look for verification query returns
        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            resetToken = String(params.get('token') || '').trim();
            resetUser = String(params.get('user') || '').trim().toLowerCase();

            if (params.get('reset') === 'true' && (!resetToken || !resetUser)) {
                showAlert('Reset link is missing required parameters. Request a new one.', 'error');
            }

            if (params.get('reset') === 'true' && resetToken && resetUser) {
                isResetRequestMode = false;
                isLoginMode = true;
                updateModeUI();
            }

            if (params.get('verified') === 'true') {
                showAlert('Account activated successfully! You can now log in below.', 'success');
            }

            updateModeUI();
        });

        function showAlert(message, type) {
            const block = document.getElementById('alertBlock');
            block.innerText = message;
            block.className = `banner banner-${type}`;
            block.style.display = 'block';
        }

        function isValidEmail(value) {
            const raw = String(value || '').trim();
            return raw.includes('@') && raw.includes('.');
        }

        function toggleAuthMode() {
            if (isResetConfirmMode()) return;

            isLoginMode = !isLoginMode;
            isResetRequestMode = false;
            document.getElementById('alertBlock').style.display = 'none';
            updateModeUI();
        }

        function enterResetRequestMode() {
            if (isResetConfirmMode()) return;
            isResetRequestMode = true;
            isLoginMode = true;
            document.getElementById('alertBlock').style.display = 'none';
            updateModeUI();
        }

        function exitResetMode() {
            if (isResetConfirmMode()) return;
            isResetRequestMode = false;
            isLoginMode = true;
            document.getElementById('alertBlock').style.display = 'none';
            updateModeUI();
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            document.getElementById('alertBlock').style.display = 'none';

            const username = document.getElementById('usernameIn').value.trim();
            const password = document.getElementById('passwordIn').value;
            const confirmPassword = document.getElementById('confirmPasswordIn').value;

            if (isResetConfirmMode()) {
                if (!password || password.length < 6) {
                    showAlert('Please choose a password with at least 6 characters.', 'error');
                    return;
                }
                if (password !== confirmPassword) {
                    showAlert('New password and confirmation do not match.', 'error');
                    return;
                }

                try {
                    const response = await fetch('/api/auth/password-reset/confirm', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user: resetUser,
                            token: resetToken,
                            newPassword: password
                        })
                    });

                    const data = await response.json();
                    if (response.ok && data.success) {
                        showAlert('Password updated successfully. Please log in with your new password.', 'success');
                        const url = new URL(window.location.href);
                        url.searchParams.delete('reset');
                        url.searchParams.delete('token');
                        url.searchParams.delete('user');
                        window.history.replaceState({}, '', `${url.pathname}${url.search}`);
                        resetToken = '';
                        resetUser = '';
                        isLoginMode = true;
                        isResetRequestMode = false;
                        document.getElementById('authForm').reset();
                        updateModeUI();
                    } else {
                        showAlert(data.error || 'Unable to reset password.', 'error');
                    }
                } catch (_err) {
                    showAlert('Network loop transmission exception dropped.', 'error');
                }
                return;
            }

            if (isResetRequestMode) {
                if (!isValidEmail(username)) {
                    showAlert('Please enter a valid email address.', 'error');
                    return;
                }
                try {
                    const response = await fetch('/api/auth/password-reset/request', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: username, username })
                    });

                    const data = await response.json();
                    if (response.ok && data.success) {
                        showAlert(data.message || 'If that email is registered, a reset link has been sent.', 'success');
                    } else {
                        showAlert(data.error || 'Unable to process password reset request.', 'error');
                    }
                } catch (_err) {
                    showAlert('Network loop transmission exception dropped.', 'error');
                }
                return;
            }
            
            const payload = { email: username, username, password };

            if (!isLoginMode && !isValidEmail(username)) {
                showAlert('Please enter a valid email address.', 'error');
                return;
            }
            
            if (!isLoginMode) {
                payload.name = document.getElementById('nameIn').value;
            }

            const targetEndpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';

            try {
                const response = await fetch(targetEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    if (isLoginMode) {
                        window.location.href = "/";
                    } else {
                        // Registration success: Clear fields and show notice
                        document.getElementById('authForm').reset();
                        showAlert(data.message, "success");
                    }
                } else {
                    showAlert(data.error || "Failed handling authorization state.", "error");
                }
            } catch (err) {
                showAlert("Network loop transmission exception dropped.", "error");
            }
        }
    </script>
</body>
</html>
