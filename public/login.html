<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix - Access Terminal</title>
    <style>
        body {
            background: #020617;
            color: #f8fafc;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: #0f172a;
            border: 1px solid #1e293b;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            color: #f1f5f9;
            text-align: center;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #64748b;
            text-align: center;
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input {
            background: #020617;
            border: 1px solid #334155;
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #2563eb;
        }

        .submit-btn {
            background: #e50914; /* Joshflix Signature Red */
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #b90710;
        }

        .toggle-box {
            margin-top: 24px;
            text-align: center;
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .toggle-link {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid #ef4444;
            color: #f87171;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="auth-card">
        <h1 id="form-title">Welcome Back</h1>
        <div class="subtitle" id="form-subtitle">Enter your details to open the home cinema desk</div>

        <div class="error-banner" id="errorBlock"></div>

        <form id="authForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="usernameIn">Username</label>
                <input type="text" id="usernameIn" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="passwordIn">Password</label>
                <input type="password" id="passwordIn" required autocomplete="current-password">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Access Workspace</button>
        </form>

        <div class="toggle-box">
            <span id="toggleText">New to Joshflix?</span>
            <span class="toggle-link" id="toggleLink" onclick="toggleAuthMode()">Create an profile</span>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const submitBtn = document.getElementById('submitBtn');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            document.getElementById('errorBlock').style.display = 'none';

            if (isLoginMode) {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Enter your details to open the home cinema desk";
                submitBtn.innerText = "Access Workspace";
                toggleText.innerText = "New to Joshflix?";
                toggleLink.innerText = "Create a profile";
            } else {
                title.innerText = "Provision Profile";
                subtitle.innerText = "Configure a brand new local isolation directory layout";
                submitBtn.innerText = "Register System Anchor";
                toggleText.innerText = "Already registered?";
                toggleLink.innerText = "Sign in here";
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const errorBlock = document.getElementById('errorBlock');
            errorBlock.style.display = 'none';

            const username = document.getElementById('usernameIn').value;
            const password = document.getElementById('passwordIn').value;

            const targetEndpoint = isLoginMode ? '/api/auth/login' : '/api/auth/register';

            try {
                const response = await fetch(targetEndpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // Success! Forward cleanly back to the internal index grid layout
                    window.location.href = "/";
                } else {
                    errorBlock.innerText = data.error || "Failed handling authorization state.";
                    errorBlock.style.display = 'block';
                }
            } catch (err) {
                errorBlock.innerText = "Network loop transmission exception dropped.";
                errorBlock.style.display = 'block';
            }
        }
    </script>
</body>
</html>
