<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse & Add TV Series</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; margin: 0; color: #f1f5f9; }
        .nav-link { color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        
        .search-bar { background: #1e293b; padding: 16px; border-radius: 12px; display: flex; align-items: center; gap: 16px; margin-bottom: 24px; border: 1px solid #334155; }
        input { flex-grow: 1; background: #0f172a; color: white; border: 1px solid #475569; padding: 12px; border-radius: 6px; font-size: 0.9rem; }
        button { background: #2563eb; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        button:hover { background: #1d4ed8; }

        .checkbox-container { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #cbd5e1; cursor: pointer; white-space: nowrap; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; border: 1px solid #334155; position: relative; }
        .cover-frame { width: 100%; aspect-ratio: 2/3; background: #020617; position: relative; }
        .cover-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-row { position: absolute; top: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; pointer-events: none; }
        .seeds-badge { background: rgba(15, 23, 42, 0.85); color: #22c55e; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; backdrop-filter: blur(4px); }
        .size-badge { background: rgba(15, 23, 42, 0.85); color: #38bdf8; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; backdrop-filter: blur(4px); }

        .card-info { padding: 14px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }
        .title { font-size: 0.85rem; font-weight: 600; line-height: 1.4; color: #f8fafc; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        
        .add-btn { background: #10b981; border: none; width: 100%; padding: 10px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .add-btn:hover { background: #059669; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #059669; color: white; padding: 16px 24px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 10px 15px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h1>Browse Series Packages</h1>
            <a href="/" class="nav-link">← Return to Library</a>
        </div>

        <div class="search-bar">
            <input type="text" id="searchIn" placeholder="Enter show name (e.g. Star Trek Strange New Worlds)...">
            <label class="checkbox-container">
                <input type="checkbox" id="packsOnlyIn" checked> TV Packs Only
            </label>
            <button onclick="executeSearch()">Search Index</button>
        </div>

        <div class="grid" id="catalog-grid"></div>
    </div>

    <div class="toast" id="toastNotice"></div>

    <script>
        document.getElementById('searchIn').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') executeSearch();
        });

        async function executeSearch() {
            const query = document.getElementById('searchIn').value.trim();
            const packsOnly = document.getElementById('packsOnlyIn').checked;
            const grid = document.getElementById('catalog-grid');

            if (!query) return;
            
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Performing OMDb structural resolve & scanning trackers...</div>';

            try {
                const res = await fetch(`/api/eztv/browse?query=${encodeURIComponent(query)}&packsOnly=${packsOnly}`);
                const data = await res.json();

                if (!data.success || !data.torrents || data.torrents.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No matching television indexes found.</div>';
                    return;
                }

                grid.innerHTML = data.torrents.map(torrent => {
                    return `
                        <div class="card">
                            <div class="cover-frame">
                                <img src="${torrent.cover}">
                                <div class="badge-row">
                                    <span class="seeds-badge">▲ ${torrent.seeds}</span>
                                    <span class="size-badge">💾 ${torrent.size}</span>
                                </div>
                            </div>
                            <div class="card-info">
                                <div class="title" title="${torrent.title}">${torrent.title}</div>
                                <button class="add-btn" onclick="addSeriesPack(this, '${btoa(torrent.magnet)}')">Ingest Series Pack</button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#f43f5e;">Error processing network data matrices.</div>';
            }
        }

        async function addSeriesPack(btn, base64Magnet) {
            const magnetUrl = atob(base64Magnet);
            btn.disabled = true;
            btn.style.background = '#475569';
            btn.innerText = 'Queuing...';

            try {
                // Pass category tag alongside target link structure
                const response = await fetch('/api/downloader/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ magnetUrl, category: 'series' })
                });

                if (response.ok) {
                    showToast("🚀 Show package pushed to qBittorrent series queue!");
                    btn.innerText = '✓ Queued';
                    btn.style.background = '#059669';
                } else {
                    throw new Error();
                }
            } catch(e) {
                showToast("❌ Core pipeline rejected tracker linkage.");
                btn.disabled = false;
                btn.style.background = '#10b981';
                btn.innerText = 'Ingest Series Pack';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastNotice');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }
    </script>
</body>
</html>
