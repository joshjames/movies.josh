<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse & Add TV Series</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 12px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        .nav-link { color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        
        .search-bar { background: #1e293b; padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; border: 1px solid #334155; }
        .controls-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; width: 100%; }
        
        input, select, button { background: #0f172a; color: white; border: 1px solid #475569; padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; outline: none; }
        input { flex-grow: 1; min-width: 200px; }
        button { background: #2563eb; border: none; cursor: pointer; font-weight: bold; min-width: 100px; }
        button:hover { background: #1d4ed8; }

        .checkbox-container { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #cbd5e1; cursor: pointer; user-select: none; }
        .checkbox-container input { width: auto; min-width: auto; cursor: pointer; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        .cover-frame { width: 100%; aspect-ratio: 2/3; background: #020617; position: relative; }
        .cover-frame img { width: 100%; height: 100%; object-fit: cover; }
        .seeds-badge { position: absolute; top: 8px; right: 8px; background: rgba(15, 23, 42, 0.85); color: #22c55e; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; backdrop-filter: blur(4px); }
        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
        .title { font-size: 0.85rem; font-weight: bold; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
        
        .add-btn { background: #10b981; border: none; width: 100%; padding: 8px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .add-btn:hover { background: #059669; }

        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 40px; margin-bottom: 24px; padding: 16px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        .page-btn { background: #0f172a; color: #f8fafc; border: 1px solid #475569; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; }
        .page-indicator { font-size: 0.9rem; color: #94a3b8; font-weight: 500; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #059669; color: white; padding: 16px 24px; border-radius: 8px; font-weight: 500; display: none; z-index: 1000; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h1>Browse EZTV Index</h1>
            <a href="/" class="nav-link">← Return to Library</a>
        </div>

        <div class="search-bar">
            <div class="controls-row">
                <input type="text" id="searchIn" placeholder="Search show name...">
                
                <label class="checkbox-container">
                    <input type="checkbox" id="packsOnlyIn" checked>
                    TV Packs Only
                </label>

                <button onclick="triggerNewSearch()">Search</button>
            </div>
        </div>

        <div class="grid" id="catalog-grid"></div>
        <div id="pagination-wrapper"></div>
    </div>

    <div class="toast" id="toastNotice"></div>

    <script>
        let currentBrowsePage = 1;

        function triggerNewSearch() {
            fetchEZTVSwarm(1);
        }

        document.getElementById('packsOnlyIn').addEventListener('change', triggerNewSearch);
        document.getElementById('searchIn').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') triggerNewSearch();
        });

        async function fetchEZTVSwarm(pageUpdate = 1) {
            currentBrowsePage = pageUpdate;
            const query = document.getElementById('searchIn').value.trim();
            const packsOnly = document.getElementById('packsOnlyIn').checked;
            
            const grid = document.getElementById('catalog-grid');
            const paginationWrapper = document.getElementById('pagination-wrapper');
            
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Querying trackers...</div>';
            paginationWrapper.innerHTML = '';

            try {
                let url = `/api/eztv/browse?page=${currentBrowsePage}&packsOnly=${packsOnly}`;
                if (query) url += `&query=${encodeURIComponent(query)}`;

                const res = await fetch(url);
                const data = await res.json();

                if (!data.success || !data.torrents || data.torrents.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No matching TV packages discovered.</div>';
                    return;
                }

                grid.innerHTML = data.torrents.map(torrent => `
                    <div class="card">
                        <div class="cover-frame">
                            <img src="${torrent.cover}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'200\' height=\'300\'><rect width=\'100%\' height=\'100%\' fill=\'%23020617\'/><text x=\'50%\' y=\'50%\' dominant-baseline=\'middle\' text-anchor=\'middle\' fill=\'%23475569\'>TV Pack</text></svg>';">
                            <div class="seeds-badge">▲ ${torrent.seeds}</div>
                        </div>
                        <div class="card-info">
                            <div>
                                <div class="title" title="${torrent.title}">${torrent.title}</div>
                                <div class="meta">Size: ${torrent.size}</div>
                            </div>
                            <button class="add-btn" onclick="addSeriesPack(this, '${btoa(torrent.magnet)}')">Ingest Pack</button>
                        </div>
                    </div>
                `).join('');

                renderPaginationControls();

            } catch (err) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#f43f5e;">Error processing network data frames.</div>';
            }
        }

        function renderPaginationControls() {
            const paginationWrapper = document.getElementById('pagination-wrapper');
            paginationWrapper.innerHTML = `
                <div class="pagination-container">
                    <button class="page-btn" ${currentBrowsePage === 1 ? 'disabled' : ''} onclick="fetchEZTVSwarm(${currentBrowsePage - 1})">◀ Previous</button>
                    <div class="page-indicator">Page ${currentBrowsePage}</div>
                    <button class="page-btn" onclick="fetchEZTVSwarm(${currentBrowsePage + 1})">Next ▶</button>
                </div>
            `;
        }

        async function addSeriesPack(buttonObj, base64Magnet) {
            const magnetUrl = atob(base64Magnet);
            buttonObj.disabled = true;
            buttonObj.style.background = '#475569';
            buttonObj.innerText = 'Queuing...';

            try {
                // Point this to your existing downloader ingest pipeline route
                const response = await fetch('/api/yts/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ magnetUrl: magnetUrl })
                });

                if (response.ok) {
                    showToast("🚀 Series pack queued cleanly inside local download client!");
                    buttonObj.innerText = '✓ Queued';
                    buttonObj.style.background = '#059669';
                } else {
                    throw new Error();
                }
            } catch(e) {
                showToast("❌ Core pipeline rejected the magnet assignment.");
                buttonObj.disabled = false;
                buttonObj.style.background = '#10b981';
                buttonObj.innerText = 'Ingest Pack';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastNotice');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        fetchEZTVSwarm(1);
    </script>
</body>
</html>
