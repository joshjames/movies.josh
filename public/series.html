<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Navigator</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .back-link { color: #3b82f6; text-decoration: none; display: inline-block; margin-bottom: 20px; font-weight: 500; }
        .layout-deck { display: flex; flex-direction: column; gap: 30px; }
        .show-sidebar { text-align: center; }
        .poster-frame { width: 100%; max-width: 260px; aspect-ratio: 2/3; background: #020617; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); margin: 0 auto 16px auto; }
        .poster-frame img { width: 100%; height: 100%; object-fit: cover; }
        h1 { margin: 0 0 8px 0; font-size: 1.8rem; color: #f1f5f9; }
        .show-meta { color: #94a3b8; font-size: 0.9rem; margin-bottom: 12px; }
        .show-plot { color: #cbd5e1; font-size: 0.95rem; line-height: 1.5; }
        .content-browser { flex-grow: 1; background: #1e293b; padding: 24px; border-radius: 12px; border: 1px solid #334155; }
        .selector-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; padding-bottom: 16px; margin-bottom: 16px; }
        select { background: #0f172a; color: white; border: 1px solid #475569; padding: 10px 16px; border-radius: 6px; font-size: 0.95rem; outline: none; cursor: pointer; }
        .episode-list { display: flex; flex-direction: column; gap: 8px; }
        .episode-row { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
        .ep-info { display: flex; flex-direction: column; gap: 4px; }
        .ep-title { font-weight: bold; color: #f1f5f9; font-size: 0.95rem; }
        .ep-meta { color: #64748b; font-size: 0.8rem; word-break: break-all; }
        .play-btn { background: #2563eb; color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.85rem; text-decoration: none; }
        .play-btn:hover { background: #1d4ed8; }
        @media(min-width: 768px) {
            .layout-deck { flex-direction: row; align-items: flex-start; }
            .show-sidebar { width: 280px; text-align: left; flex-shrink: 0; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="/" class="back-link">← Back to Library</a>

        <div class="layout-deck">
            <div class="show-sidebar">
                <div class="poster-frame">
                    <img id="show-poster" src="" alt="Show Poster" onerror="this.src='https://via.placeholder.com/200x300?text=No+Cover'">
                </div>
                <h1 id="show-title">Loading Show...</h1>
                <div class="show-meta" id="show-meta"></div>
                <p class="show-plot" id="show-plot"></p>
            </div>

            <div class="content-browser">
                <div class="selector-row">
                    <h3 style="margin:0; color:#3b82f6;">Episodes</h3>
                    <select id="season-select" onchange="loadSeasonEpisodes(this.value)">
                        </select>
                </div>

                <div class="episode-list" id="episode-list">
                    </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        // Extracts the ID parameter (e.g., series/Rick.and.Morty)
        const showId = params.get('id'); 
        let serverShowData = null;

        async function initPage() {
            if (!showId) {
                alert("Missing tracking resource details.");
                window.location.href = "/";
                return;
            }

            try {
                // Strips out the 'series/' identifier prefix to match our backend router requirements
                const cleanFolder = showId.replace('series/', '');
                const response = await fetch(`/api/series/${encodeURIComponent(cleanFolder)}`);
                serverShowData = await response.json();

                document.getElementById('show-poster').src = serverShowData.poster;
                document.getElementById('show-title').innerText = serverShowData.title;
                document.getElementById('show-meta').innerText = `${serverShowData.year} • ${serverShowData.genre}`;
                document.getElementById('show-plot').innerText = serverShowData.plot || "No description loaded.";

                const seasonsAvailable = Object.keys(serverShowData.seasons).sort((a,b) => a - b);
                const seasonSelect = document.getElementById('season-select');
                
                if (seasonsAvailable.length === 0) {
                    document.getElementById('episode-list').innerHTML = `<div style="color:#64748b;text-align:center;padding:40px;">No processed track files found on disk structures.</div>`;
                    return;
                }

                seasonSelect.innerHTML = seasonsAvailable.map(s => 
                    `<option value="${s}">Season ${s}</option>`
                ).join('');

                loadSeasonEpisodes(seasonsAvailable[0]);
            } catch (err) {
                console.error("Failed executing structural pipeline initialization:", err);
                document.getElementById('show-title').innerText = "Failed Loading Show Metadata.";
            }
        }

        function loadSeasonEpisodes(seasonNum) {
            const container = document.getElementById('episode-list');
            const episodes = serverShowData.seasons[seasonNum] || [];

            container.innerHTML = episodes.map(ep => `
                <div class="episode-row">
                    <div class="ep-info">
                        <span class="ep-title">Episode ${ep.num} - ${ep.title}</span>
                        <span class="ep-meta">${ep.file}</span>
                    </div>
                    <a class="play-btn" href="player.html?id=${encodeURIComponent(showId)}&season=${seasonNum}&episode=${ep.num}">
                        Play
                    </a>
                </div>
            `).join('');
        }

        window.onload = initPage;
    </script>
</body>
</html>
