<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unified Media Browser</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 12px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        .nav-link { color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        
        /* Navigation Tabs Control */
        .tabs-row { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 2px solid #1e293b; padding-bottom: 8px; }
        .tab-btn { background: transparent; border: none; color: #94a3b8; padding: 10px 20px; font-weight: 600; cursor: pointer; font-size: 1rem; border-radius: 6px; min-width: auto; }
        .tab-btn.active { background: #1e293b; color: #3b82f6; border-bottom: 2px solid #3b82f6; }

        /* Filter Controls Container */
        .search-bar { background: #1e293b; padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; border: 1px solid #334155; }
        .controls-row { display: flex; flex-wrap: wrap; gap: 12px; width: 100%; align-items: center; }
        
        input, select, button { background: #0f172a; color: white; border: 1px solid #475569; padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; outline: none; }
        input { flex-grow: 1; min-width: 200px; }
        button { background: #2563eb; border: none; cursor: pointer; font-weight: bold; min-width: 100px; }
        button:hover { background: #1d4ed8; }

        .checkbox-container { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #cbd5e1; cursor: pointer; white-space: nowrap; user-select: none; }

        /* Item 7 Manual Link Wrapper Section */
        .manual-input-box { display: flex; gap: 12px; width: 100%; border-top: 1px solid #334155; padding-top: 14px; margin-top: 2px; }
        .manual-input-box input { background: #090d16; border-color: #334155; }
        .manual-btn { background: #10b981; }
        .manual-btn:hover { background: #059669; }

        /* Results Matrix Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; border: 1px solid #334155; }
        .cover-frame { width: 100%; aspect-ratio: 2/3; background: #020617; position: relative; }
        .cover-frame img { width: 100%; height: 100%; object-fit: cover; }
        
        .badge-row { position: absolute; top: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; pointer-events: none; }
        .rating-badge, .seeds-badge, .size-badge { background: rgba(15, 23, 42, 0.85); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; backdrop-filter: blur(4px); }
        .rating-badge { color: #f59e0b; }
        .seeds-badge { color: #22c55e; }
        .size-badge { color: #38bdf8; }

        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
        .title { font-size: 0.85rem; font-weight: bold; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #f8fafc; }
        .meta { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
        
        .add-btn { background: #10b981; border: none; width: 100%; padding: 8px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: background 0.2s; }
        .add-btn:hover { background: #059669; }

        /* Notification Toast Styling */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #059669; color: white; padding: 16px 24px; border-radius: 8px; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); display: none; z-index: 1000; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media(min-width: 640px) { h1 { font-size: 2rem; } .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; } }
        
        /* Pagination Control Bar Styling */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 40px; margin-bottom: 24px; padding: 16px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
        .page-btn { background: #0f172a; color: #f8fafc; border: 1px solid #475569; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 500; transition: all 0.2s ease; }
        .page-btn:hover:not(:disabled) { background: #2563eb; border-color: #3b82f6; }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; border-color: #334155; }
        .page-indicator { font-size: 0.9rem; color: #94a3b8; font-weight: 500; min-width: 100px; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h1>Browse Catalog</h1>
            <a href="/" class="nav-link">← Return to Library</a>
        </div>

        <div class="tabs-row">
            <button class="tab-btn active" id="tab-movies" onclick="switchMode('movies')">Movies</button>
            <button class="tab-btn" id="tab-shows" onclick="switchMode('shows')">TV Series</button>
        </div>

        <div class="search-bar">
            <div class="controls-row">
                <input type="text" id="searchIn" placeholder="Search title, actor, or genre...">
                
                <select id="genreIn">
                    <option value="All">All Genres</option>
                    <option value="action">Action</option>
                    <option value="adventure">Adventure</option>
                    <option value="animation">Animation</option>
                    <option value="biography">Biography</option>
                    <option value="comedy">Comedy</option>
                    <option value="crime">Crime</option>
                    <option value="documentary">Documentary</option>
                    <option value="drama">Drama</option>
                    <option value="family">Family</option>
                    <option value="fantasy">Fantasy</option>
                    <option value="film-noir">Film-Noir</option>
                    <option value="history">History</option>
                    <option value="horror">Horror</option>
                    <option value="music">Music</option>
                    <option value="musical">Musical</option>
                    <option value="mystery">Mystery</option>
                    <option value="romance">Romance</option>
                    <option value="sci-fi">Sci-Fi</option>
                    <option value="sport">Sport</option>
                    <option value="thriller">Thriller</option>
                    <option value="war">War</option>
                    <option value="western">Western</option>
                </select>
                <select id="ratingIn">
                    <option value="0">Any Rating</option>
                    <option value="6">⭐ 6.0+ IMDb</option>
                    <option value="7">⭐ 7.0+ IMDb</option>
                    <option value="8">⭐ 8.0+ IMDb</option>
                </select>
                <select id="sortIn">
                    <option value="date_added">Sort: Latest Added</option> 
                    <option value="seeds">Sort: Most Seeds</option>
                    <option value="year">Sort: Release Year</option>
                    <option value="rating">Sort: IMDb Score</option>
                </select>

                <label class="checkbox-container" id="packsWrapper" style="display: none;">
                    <input type="checkbox" id="packsOnlyIn"> Show Whole Seasons Only
                </label>
            </div>

            <div class="manual-input-box">
                <input type="text" id="manualMagnetIn" placeholder="Paste direct magnet link...">
                <button class="manual-btn" onclick="addManualMagnet(this)">Ingest Link</button>
            </div>
        </div>

        <div id="catalog-grid" class="grid"></div>
        <div id="pagination-wrapper"></div>
        <div id="toastNotice" class="toast"></div>
    </div>

    <script>
        let currentMode = 'movies';
        let currentBrowsePage = 1;
        let tvSearchTimer = null;

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('tab-movies').classList.toggle('active', mode === 'movies');
            document.getElementById('tab-shows').classList.toggle('active', mode === 'shows');

            const isMovie = mode === 'movies';
            document.getElementById('genreIn').style.display = isMovie ? 'inline-block' : 'none';
            document.getElementById('ratingIn').style.display = isMovie ? 'inline-block' : 'none';
            document.getElementById('sortIn').style.display = isMovie ? 'inline-block' : 'none';
            document.getElementById('packsWrapper').style.display = isMovie ? 'none' : 'flex';

            document.getElementById('searchIn').placeholder = isMovie
                ? 'Search title, actor, or genre...'
                : 'Search TV series from local IMDb index...';

            if (!isMovie) {
                // Prevent stale movie query terms from making TV mode look empty.
                document.getElementById('searchIn').value = '';
            }

            triggerNewSearch();
        }

        function triggerNewSearch() {
            if (currentMode === 'movies') {
                fetchMovieCatalog(1);
            } else {
                fetchShowCatalog();
            }
        }

        document.getElementById('genreIn').addEventListener('change', triggerNewSearch);
        document.getElementById('ratingIn').addEventListener('change', triggerNewSearch);
        document.getElementById('sortIn').addEventListener('change', triggerNewSearch);
        document.getElementById('packsOnlyIn').addEventListener('change', () => {
            if (currentMode === 'shows') {
                fetchShowCatalog();
            }
        });
        document.getElementById('searchIn').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') triggerNewSearch();
        });
        document.getElementById('searchIn').addEventListener('input', () => {
            if (currentMode !== 'shows') return;
            if (tvSearchTimer) clearTimeout(tvSearchTimer);
            tvSearchTimer = setTimeout(() => {
                fetchShowCatalog();
            }, 220);
        });

        async function parseJsonOrThrow(response) {
            const raw = await response.text();
            let parsed;
            try {
                parsed = raw ? JSON.parse(raw) : {};
            } catch (_err) {
                throw new Error(`HTTP ${response.status}: non-JSON response`);
            }

            if (!response.ok) {
                const msg = parsed && parsed.error ? parsed.error : `HTTP ${response.status}`;
                throw new Error(msg);
            }

            return parsed;
        }

        function renderTvCards(items) {
            return items.map(show => {
                const yearLabel = show.endYear && show.endYear !== '\\N'
                    ? `${show.startYear || '?'}-${show.endYear}`
                    : (show.startYear || 'Year unknown');
                const votes = Number(show.numVotes || 0).toLocaleString();
                const rating = Number(show.averageRating || 0).toFixed(1);
                const safeTitle = String(show.title || '').replace(/'/g, "\\'");

                return `
                    <div class="card">
                        <div class="cover-frame">
                            <img src="${show.cover}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"300\"><rect width=\"100%\" height=\"100%\" fill=\"%23020617\"/><text x=\"50%\" y=\"50%\" dominant-baseline=\"middle\" text-anchor=\"middle\" fill=\"%23475569\">No Cover</text></svg>'">
                            <div class="badge-row">
                                <span class="rating-badge">⭐ ${rating}</span>
                                <span class="size-badge">${votes} votes</span>
                            </div>
                        </div>
                        <div class="card-info">
                            <div>
                                <div class="title" title="${show.title}">${show.title}</div>
                                <div class="meta">${yearLabel} • ${show.genres || 'Unknown genres'}</div>
                            </div>
                            <button class="add-btn" style="background:#10b981;" onclick="loadShowTorrents('${show.imdbId}', '${safeTitle}')">Browse Episodes</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchMovieCatalog(page = 1) {
            currentBrowsePage = page;
            const query = document.getElementById('searchIn').value.trim();
            const genre = document.getElementById('genreIn').value;
            const rating = document.getElementById('ratingIn').value;
            const sortBy = document.getElementById('sortIn').value;
            const grid = document.getElementById('catalog-grid');
            const paginationWrapper = document.getElementById('pagination-wrapper');

            if (!grid || !paginationWrapper) return;

            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Querying movie index structures...</div>';
            paginationWrapper.innerHTML = '';

            try {
                let apiTarget = `/api/yts/browse?page=${currentBrowsePage}`;
                if (query) apiTarget += `&query_term=${encodeURIComponent(query)}`;
                if (genre && genre !== 'All') apiTarget += `&genre=${genre}`;
                if (rating && rating !== '0') apiTarget += `&minimum_rating=${rating}`;
                if (sortBy) apiTarget += `&sort_by=${sortBy}`;

                const res = await fetch(apiTarget);
                const resData = await res.json();

                if (resData.status !== 'ok' || !resData.data.movies || resData.data.movies.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No matching movie indexes found.</div>';
                    return;
                }

                const cardsHtml = resData.data.movies.map(movie => {
                    const targetTorrent = movie.torrents.find(t => t.quality === '1080p') || movie.torrents[0];
                    if (!targetTorrent) return '';

                    const trackers = [
                        'udp://tracker.opentrackr.org:1337/announce',
                        'udp://tracker.torrent.eu.org:451/announce',
                        'udp://open.stealth.si:80/announce'
                    ].map(tr => `&tr=${encodeURIComponent(tr)}`).join('');

                    const cleanHash = targetTorrent.hash.toUpperCase().trim();
                    const baseMagnet = `magnet:?xt=urn:btih:${cleanHash}&dn=${encodeURIComponent(movie.title)}${trackers}`;

                    return `
                        <div class="card">
                            <div class="cover-frame">
                                <img src="${movie.medium_cover_image}" alt="${movie.title}">
                                <div class="badge-row">
                                    <span class="rating-badge">⭐ ${movie.rating.toFixed(1)}</span>
                                </div>
                            </div>
                            <div class="card-info">
                                <div>
                                    <div class="title">${movie.title}</div>
                                    <div class="meta">${movie.year} • ${movie.runtime} min</div>
                                </div>
                                <button class="add-btn" onclick="addMediaAsset(this, '${btoa(baseMagnet)}', 'movie-streamer', '${movie.imdb_code || ''}')">Add to Library</button>
                            </div>
                        </div>
                    `;
                }).join('');

                grid.innerHTML = cardsHtml;
                renderPaginationControls(resData.data.movie_count, resData.data.limit);
            } catch (_err) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#f43f5e;">Error processing movie catalog requests.</div>';
            }
        }

        async function fetchShowCatalog() {
            const query = document.getElementById('searchIn').value.trim();
            const grid = document.getElementById('catalog-grid');
            const paginationWrapper = document.getElementById('pagination-wrapper');
            const limit = query ? 40 : 50;

            if (!grid || !paginationWrapper) return;

            paginationWrapper.innerHTML = '';
            grid.innerHTML = query
                ? '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Searching TV index...</div>'
                : '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Loading top TV shows...</div>';

            try {
                const res = await fetch(`/api/tv-shows/search?q=${encodeURIComponent(query)}&limit=${limit}`);
                const data = await parseJsonOrThrow(res);

                if (!data.success || !data.items || data.items.length === 0) {
                    if (query) {
                        const topRes = await fetch('/api/tv-shows/search?limit=50');
                        const topData = await parseJsonOrThrow(topRes);
                        if (topData.success && Array.isArray(topData.items) && topData.items.length > 0) {
                            grid.innerHTML = topData.items.map(show => show).length
                                ? `<div style="grid-column: 1/-1; text-align:center; padding:10px 8px 18px; color:#94a3b8;">No matches for "${query}". Showing top TV shows instead.</div>${renderTvCards(topData.items)}`
                                : '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No TV series found.</div>';
                            return;
                        }
                    }
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No matching TV series found.</div>';
                    return;
                }

                grid.innerHTML = renderTvCards(data.items);
            } catch (_err) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#f43f5e;">Error loading TV index.</div>';
            }
        }

        async function loadShowTorrents(imdbId, showTitle) {
            const grid = document.getElementById('catalog-grid');
            const packsOnly = document.getElementById('packsOnlyIn').checked;
            const paginationWrapper = document.getElementById('pagination-wrapper');

            if (!grid || !paginationWrapper) return;

            paginationWrapper.innerHTML = '';
            grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Loading releases for ${showTitle}...</div>`;

            try {
                const res = await fetch(`/api/eztv/browse?imdbId=${encodeURIComponent(imdbId)}&packsOnly=${packsOnly}`);
                const data = await parseJsonOrThrow(res);

                if (!data.success || !data.torrents || data.torrents.length === 0) {
                    grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No releases found for ${showTitle}.</div>`;
                    return;
                }

                grid.innerHTML = `
                    <div style="grid-column: 1/-1; display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:4px;">
                        <div>
                            <h2 style="margin:0 0 4px 0; font-size:1.1rem; color:#f8fafc;">${showTitle}</h2>
                            <div style="color:#94a3b8; font-size:0.85rem;">IMDb ${imdbId} • ${data.torrents.length} seasons • Whole seasons only: ${packsOnly ? 'ON' : 'OFF'}</div>
                            ${data.packsFallbackUsed ? '<div style="color:#f59e0b; font-size:0.8rem; margin-top:4px;">No explicit season-pack tags found on EZTV; showing best seeded season releases.</div>' : ''}
                            ${Array.isArray(data.upstreamWarnings) && data.upstreamWarnings.length ? `<div style="color:#f97316; font-size:0.8rem; margin-top:4px;">${data.upstreamWarnings[0]}</div>` : ''}
                        </div>
                        <button class="page-btn" style="background:#334155;" onclick="fetchShowCatalog()">Back to Shows</button>
                    </div>
                    ${data.torrents.map(torrent => `
                        <div class="card">
                            <div class="cover-frame">
                                <img src="${torrent.cover}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"200\" height=\"300\"><rect width=\"100%\" height=\"100%\" fill=\"%23020617\"/><text x=\"50%\" y=\"50%\" dominant-baseline=\"middle\" text-anchor=\"middle\" fill=\"%23475569\">No Cover</text></svg>'">
                                <div class="badge-row">
                                    <span class="seeds-badge">▲ ${torrent.seeds}</span>
                                    <span class="size-badge">💾 ${torrent.size}</span>
                                </div>
                            </div>
                            <div class="card-info">
                                <div>
                                    <div class="title" title="${torrent.title}">${torrent.title}</div>
                                    <div class="meta">IMDb ${torrent.imdbId}${torrent.originalTitle ? ` • Source: ${torrent.originalTitle}` : ''}${torrent.sourceType ? ` • Type: ${torrent.sourceType}` : ''}</div>
                                </div>
                                <button class="add-btn" style="background:#10b981;" onclick="addMediaAsset(this, '${btoa(torrent.magnet)}', 'series-streamer', '${torrent.imdbId || ''}')">Ingest Season</button>
                            </div>
                        </div>
                    `).join('')}
                `;
            } catch (err) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#f43f5e;">Error loading releases for this show. ${err && err.message ? err.message : ''}</div>`;
            }
        }

        function renderPaginationControls(totalMovies, pageLimit) {
            const paginationWrapper = document.getElementById('pagination-wrapper');
            if (!totalMovies || !pageLimit) return;

            const totalPages = Math.ceil(totalMovies / pageLimit);
            if (totalPages <= 1) return;

            paginationWrapper.innerHTML = `
                <div class="pagination-container">
                    <button class="page-btn" ${currentBrowsePage === 1 ? 'disabled' : ''} onclick="fetchMovieCatalog(${currentBrowsePage - 1})">◀ Previous</button>
                    <div class="page-indicator">Page ${currentBrowsePage} / ${totalPages}</div>
                    <button class="page-btn" ${currentBrowsePage === totalPages ? 'disabled' : ''} onclick="fetchMovieCatalog(${currentBrowsePage + 1})">Next ▶</button>
                </div>
            `;
        }

        async function addMediaAsset(btn, base64Magnet, targetCategory, imdbId = '') {
            const magnetUrl = atob(base64Magnet);
            btn.disabled = true;
            btn.style.background = '#475569';
            btn.innerText = 'Queuing...';

            const apiRoute = targetCategory === 'series-streamer' ? '/api/downloader/add' : '/api/yts/add';

            try {
                const response = await fetch(apiRoute, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ magnetUrl, category: targetCategory, imdbId })
                });

                if (!response.ok) throw new Error('Request failed');

                showToast(targetCategory === 'series-streamer'
                    ? 'Release pushed to series queue.'
                    : 'Added to movie queue.'
                );
                btn.innerText = 'Queued';
                btn.style.background = '#059669';
            } catch (_err) {
                showToast('Core pipeline rejected tracker linkage.');
                btn.disabled = false;
                btn.style.background = '#10b981';
                btn.innerText = targetCategory === 'series-streamer' ? 'Ingest Release' : 'Add to Library';
            }
        }

        function addManualMagnet(buttonObj) {
            const inputEl = document.getElementById('manualMagnetIn');
            const rawMagnet = inputEl.value.trim();

            if (!rawMagnet || !rawMagnet.toLowerCase().startsWith('magnet:?xt=')) {
                showToast('Invalid link format. Missing magnet header structure.');
                return;
            }

            buttonObj.disabled = true;
            buttonObj.innerText = 'Processing...';

            addMediaAsset(buttonObj, btoa(rawMagnet), currentMode === 'movies' ? 'movie-streamer' : 'series-streamer', '');
            inputEl.value = '';
            buttonObj.disabled = false;
            buttonObj.innerText = 'Ingest Link';
        }

        function showToast(msg) {
            const toast = document.getElementById('toastNotice');
            if (!toast) return;
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchMovieCatalog(1);
        });
    </script>
</body>
</html>
