<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse & Add Movies</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 12px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        .nav-link { color: #3b82f6; text-decoration: none; font-weight: 500; font-size: 0.9rem; }
        
        /* Filter Controls */
        .search-bar { background: #1e293b; padding: 16px; border-radius: 12px; display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; border: 1px solid #334155; }
        input, select, button { background: #0f172a; color: white; border: 1px solid #475569; padding: 10px 14px; border-radius: 6px; font-size: 0.9rem; outline: none; }
        input { flex-grow: 1; min-width: 200px; }
        button { background: #2563eb; border: none; cursor: pointer; font-weight: bold; min-width: 100px; }
        button:hover { background: #1d4ed8; }

        /* Results Matrix Grid Layout */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; }
        .card { background: #1e293b; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); position: relative; }
        .cover-frame { width: 100%; aspect-ratio: 2/3; background: #020617; position: relative; }
        .cover-frame img { width: 100%; height: 100%; object-fit: cover; }
        .rating-badge { position: absolute; top: 8px; right: 8px; background: rgba(15, 23, 42, 0.85); color: #f59e0b; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; backdrop-filter: blur(4px); }
        .card-info { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; }
        .title { font-size: 0.9rem; font-weight: bold; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .meta { font-size: 0.75rem; color: #94a3b8; margin-top: 2px; }
        
        .add-btn { background: #10b981; border: none; width: 100%; padding: 8px; border-radius: 6px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        .add-btn:hover { background: #059669; }

        /* Notification Toast Styling */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #059669; color: white; padding: 16px 24px; border-radius: 8px; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); display: none; z-index: 1000; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        @media(min-width: 640px) { h1 { font-size: 2rem; } .grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h1>Browse Catalog</h1>
            <a href="/" class="nav-link">← Return to Library</a>
        </div>

        <div class="search-bar">
            <input type="text" id="searchIn" placeholder="Search title, actor, or genre...">
            <select id="genreIn">
                <option value="All">All Genres</option>
                <option value="action">Action</option>
                <option value="comedy">Comedy</option>
                <option value="drama">Drama</option>
                <option value="horror">Horror</option>
                <option value="sci-fi">Sci-Fi</option>
                <option value="thriller">Thriller</option>
            </select>
            <select id="ratingIn">
                <option value="0">Any Rating</option>
                <option value="7">⭐ 7.0+ IMDb</option>
                <option value="8">⭐ 8.0+ IMDb</option>
            </select>
            <button onclick="fetchCatalog()">Search</button>
        </div>

        <div class="grid" id="catalog-grid"></div>
    </div>

    <div class="toast" id="toastNotice"></div>

    <script>
        let currentPage = 1;

        async function fetchCatalog() {
            const query = document.getElementById('searchIn').value;
            const genre = document.getElementById('genreIn').value;
            const rating = document.getElementById('ratingIn').value;
            const grid = document.getElementById('catalog-grid');
            
            grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">Querying index structures...</div>';

            try {
                const res = await fetch(`/api/yts/browse?query=${encodeURIComponent(query)}&genre=${genre}&min_rating=${rating}&page=${currentPage}`);
                const resData = await res.json();

                if(resData.status !== 'ok' || !resData.data.movies) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#94a3b8;">No matches found matching criteria targets.</div>';
                    return;
                }

                grid.innerHTML = resData.data.movies.map(movie => {
                    // Pick best profile copy option available (prefers 1080p, then 720p)
                    const targetTorrent = movie.torrents.find(t => t.quality === '1080p') || movie.torrents[0];
                    if (!targetTorrent) return '';

                    // Construct magnet string dynamically matching API guidelines rules
                    const baseMagnet = `magnet:?xt=urn:btih:${targetTorrent.hash}&dn=${encodeURIComponent(movie.title)}&tr=udp://tracker.opentrackr.org:1337/announce&tr=udp://tracker.torrent.eu.org:451/announce&tr=udp://open.stealth.si:80/announce`;

                    return `
                        <div class="card">
                            <div class="cover-frame">
                                <img src="${movie.medium_cover_image}" alt="${movie.title}">
                                <div class="rating-badge">⭐ ${movie.rating.toFixed(1)}</div>
                            </div>
                            <div class="card-info">
                                <div>
                                    <div class="title">${movie.title}</div>
                                    <div class="meta">${movie.year} • ${movie.runtime} min</div>
                                </div>
                                <button class="add-btn" onclick="addMovie(this, '${btoa(baseMagnet)}')">Add to Library</button>
                            </div>
                        </div>
                    `;
                }).join('');

            } catch (err) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding:40px; color:#f43f5e;">Error processing network catalog array requests.</div>';
            }
        }

        async function addMovie(buttonObj, base64Magnet) {
            const magnetUrl = atob(base64Magnet);
            buttonObj.disabled = true;
            buttonObj.style.background = '#475569';
            buttonObj.innerText = 'Queuing...';

            try {
                const response = await fetch('/api/yts/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ magnetUrl })
                });

                if (response.ok) {
                    showToast("🎬 Added to queue! Optimization scripts will process files in 5-10 minutes once downloaded.");
                    buttonObj.innerText = '✓ Queued';
                    buttonObj.style.background = '#059669';
                } else {
                    throw new Error();
                }
            } catch(e) {
                showToast("❌ Pipeline communication block encountered.");
                buttonObj.disabled = false;
                buttonObj.style.background = '#10b981';
                buttonObj.innerText = 'Add to Library';
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastNotice');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 6000);
        }

        // Auto initialization load run
        fetchCatalog();
    </script>
</body>
</html>
