<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joshflix Admin Control Unit</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; margin: 0; padding: 24px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #f1f5f9; border-bottom: 1px solid #1e293b; padding-bottom: 12px; }
        
        /* Show Row Grid Layout split for poster + form fields */
        .show-row { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 18px; margin-bottom: 16px; display: flex; gap: 20px; }
        .poster-aside { flex: 0 0 140px; display: flex; flex-direction: column; gap: 8px; }
        .main-form-content { flex: 1; display: flex; flex-direction: column; gap: 12px; }
        
        .row-header { font-weight: bold; font-size: 1.1rem; color: #38bdf8; display: flex; justify-content: space-between; }
        .meta-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group.full-width { grid-column: 1 / -1; }
        label { font-size: 0.8rem; color: #94a3b8; font-weight: 600; }
        input, textarea { background: #0f172a; color: white; border: 1px solid #475569; padding: 8px; border-radius: 4px; font-family: inherit; }
        
        button { background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: background 0.2s; align-self: flex-end; }
        button:hover { background: #1d4ed8; }
        .badge { background: #e50914; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; }
        
        /* Streaming Monitor Console Window */
        .console-box { background: #020617; border: 1px solid #1e293b; font-family: 'Courier New', monospace; font-size: 0.85rem; padding: 14px; border-radius: 6px; height: 300px; overflow-y: auto; margin-bottom: 24px; color: #38bdf8; white-space: pre-wrap; }
        .log-line { border-bottom: 1px solid #0f172a; padding: 2px 0; }
        .log-error { color: #f87171; }
        .log-warn { color: #fbbf24; }
        .controls { margin-top: 16px; margin-bottom: 16px; display: flex; gap: 12px; }
        .btn-trigger { background: #10b981; color: white; }
        .btn-trigger:hover { background: #059669; }

        /* Drag and Drop Admin Zones */
        .admin-drop-zone { width: 140px; height: 210px; border: 2px dashed #475569; border-radius: 6px; background: #0f172a; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .admin-drop-zone.dragover { border-color: #38bdf8; background: #1e293b; }
        .admin-drop-zone img { width: 100%; height: 100%; object-fit: cover; }
        .drop-zone-text { position: absolute; text-align: center; color: #64748b; font-size: 0.75rem; padding: 8px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Joshflix Library Override Desk</h1>
        
        <div class="controls">
            <button class="btn-trigger" onclick="triggerSanitizer()">Run Sanitizer Sweep Now</button>
        </div>

        <h3>🖥️ Live Application Stream Monitor</h3>
        <div class="console-box" id="terminal-stream">Connecting to core logger pipeline...</div>

        <h2>📺 Localized Show Catalogs</h2>
        <div id="shows-list">Loading localized show catalogs...</div>
    </div>

    <script>
        // --- 1. LIVE LOG MONITOR STREAM (SSE WITH KEEPALIVE) ---
        function connectToLogStream() {
            const consoleTerminal = document.getElementById('terminal-stream');
            consoleTerminal.innerHTML = '';

            const eventSource = new EventSource('/api/admin/logs/stream');

            eventSource.onmessage = function(event) {
                const line = event.data;
                const lineEl = document.createElement('div');
                lineEl.className = 'log-line';
                
                if (line.includes('[ERROR]')) lineEl.className += ' log-error';
                if (line.includes('[WARN]')) lineEl.className += ' log-warn';
                
                lineEl.textContent = line;
                consoleTerminal.appendChild(lineEl);
                consoleTerminal.scrollTop = consoleTerminal.scrollHeight;
            };

            eventSource.onerror = function() {
                consoleTerminal.innerHTML = `<div class="log-error">[SYSTEM] Connection lost. Re-establishing secure transport socket...</div>`;
            };
        }

        // --- 2. BACKGROUND PROCESS INVOKER ---
        async function triggerSanitizer() {
            try {
                const res = await fetch('/api/admin/sanitizer/run', { method: 'POST' });
                const data = await res.json();
                if(data.success) {
                    console.log("Sanitizer execution signal acknowledged successfully.");
                }
            } catch(e) {
                console.error("Transport pipeline failed invocation:", e);
            }
        }

        // --- 3. SHOW DATA INJECTOR & RENDERER ---
        async function loadShows() {
            try {
                const res = await fetch('/api/admin/series-metadata');
                const data = await res.json();
                const container = document.getElementById('shows-list');

                if (data.shows.length === 0) {
                    container.innerHTML = "<p>No active television series structures discovered on internal storage volumes.</p>";
                    return;
                }

                container.innerHTML = data.shows.map(show => {
                    // Fallback to cache-busted path if asset exists or broken image logic takes over
                    //const posterPath = `/series-assets/${show.folder}/cover.jpg?t=${new Date().getTime()}`;
                    const posterPath = `/movie-assets/series/${show.folder}/cover.jpg?t=${new Date().getTime()}`;
                    
                    return `
                    <div class="show-row" id="row-${show.folder}">
                        <div class="poster-aside">
                            <label>Show Artwork</label>
                            <div class="admin-drop-zone" 
                                 id="dropzone-${show.folder}" 
                                 ondragover="handleDragOver(event, '${show.folder}')" 
                                 ondragleave="handleDragLeave(event, '${show.folder}')" 
                                 ondrop="handleDrop(event, '${show.folder}')">
                                <img src="${posterPath}" id="img-${show.folder}" onerror="handleImgError('${show.folder}')" />
                                <div class="drop-zone-text" id="text-${show.folder}" style="display:none;">
                                    📥<br>Drag & Drop poster image
                                </div>
                            </div>
                        </div>

                        <div class="main-form-content">
                            <div class="row-header">
                                <span>Folder: /series/${show.folder}</span>
                                ${!show.metadata.plot ? '<span class="badge">Missing Metadata</span>' : ''}
                            </div>
                            <div class="meta-form">
                                <div class="form-group">
                                    <label>Display Title</label>
                                    <input type="text" id="title-${show.folder}" value="${show.metadata.title || ''}">
                                </div>
                                <div class="form-group">
                                    <label>Release Year(s)</label>
                                    <input type="text" id="year-${show.folder}" value="${show.metadata.year || ''}">
                                </div>
                                <div class="form-group">
                                    <label>Genre tags</label>
                                    <input type="text" id="genre-${show.folder}" value="${show.metadata.genre || ''}">
                                </div>
                                <div class="form-group">
                                    <label>Manual OMDb/IMDb ID Lookup Link Override</label>
                                    <input type="text" id="imdbId-${show.folder}" placeholder="e.g., tt0123456" value="${show.metadata.imdbId || ''}">
                                </div>
                                <div class="form-group full-width">
                                    <label>Plot Synopsis Outline</label>
                                    <textarea id="plot-${show.folder}" rows="2">${show.metadata.plot || ''}</textarea>
                                </div>
                                <button onclick="saveOverride('${show.folder}')">Save Changes</button>
                            </div>
                        </div>
                    </div>
                `}).join('');
            } catch (err) {
                console.error("Admin dashboard extraction crash:", err);
            }
        }

        // --- 4. DRAG & DROP BINARY DATA STRIPPING LOGIC ---
        function handleImgError(folder) {
            document.getElementById(`img-${folder}`).style.display = 'none';
            document.getElementById(`text-${folder}`).style.display = 'block';
        }

        function handleDragOver(e, folder) {
            e.preventDefault();
            document.getElementById(`dropzone-${folder}`).classList.add('dragover');
        }

        function handleDragLeave(e, folder) {
            e.preventDefault();
            document.getElementById(`dropzone-${folder}`).classList.remove('dragover');
        }

        function handleDrop(e, folder) {
            e.preventDefault();
            document.getElementById(`dropzone-${folder}`).classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onloadend = async function() {
                        const base64Data = reader.result;
                        await executePosterUpload(folder, base64Data);
                    };
                }
            }
        }

        async function executePosterUpload(folder, base64Data) {
            try {
                const response = await fetch('/api/admin/upload-poster', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ folder, image: base64Data })
                });
                const resData = await response.json();
                if (resData.success) {
                    const img = document.getElementById(`img-${folder}`);
                    //img.src = `/series-assets/${folder}/cover.jpg?t=${new Date().getTime()}`;
                    img.src = `/movie-assets/series/${folder}/cover.jpg?t=${new Date().getTime()}`;
                    img.style.display = 'block';
                    document.getElementById(`text-${folder}`).style.display = 'none';
                } else {
                    alert("Upload error: " + resData.error);
                }
            } catch (err) {
                alert("Network communication error during artwork stream.");
            }
        }

        // --- 5. TEXT METADATA SYNC LOOP ---
        async function saveOverride(folder) {
            const payload = {
                folder,
                title: document.getElementById(`title-${folder}`).value,
                year: document.getElementById(`year-${folder}`).value,
                genre: document.getElementById(`genre-${folder}`).value,
                imdbId: document.getElementById(`imdbId-${folder}`).value,
                plot: document.getElementById(`plot-${folder}`).value
            };

            try {
                const res = await fetch('/api/admin/override-metadata', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (result.success) {
                    loadShows();
                } else {
                    alert("❌ Override failure: " + result.error);
                }
            } catch (err) {
                alert("❌ Critical transport loop disruption.");
            }
        }

        // Boot system listeners
        connectToLogStream();
        loadShows();
    </script>
</body>
</html>
